<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#66c7ff">
  <meta name="application-name" content="The Jewesh Bros">
  <meta name="apple-mobile-web-app-title" content="The Jewesh Bros">
  <meta name="description" content="Play The Jewesh Bros, a colorful mobile platform game with coins, skins, abilities, touch controls, clouds, levels, and classic pixel-style action.">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="The Jewesh Bros">
  <meta property="og:description" content="A colorful mobile platform game with coins, skins, abilities, touch controls, and pixel-style levels.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://bananassd2.github.io/superkippahbros/super_kippah_bros_phone.html">
  <link rel="canonical" href="https://bananassd2.github.io/superkippahbros/super_kippah_bros_phone.html">
  <link rel="manifest" href="super_kippah_manifest.webmanifest">
  <link rel="icon" href="super_kippah_icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="super_kippah_icon.svg">
  <title>The Jewesh Bros - Mobile Game</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      overflow: hidden;
      background: #0b1220;
      touch-action: none;
      user-select: none;
      overscroll-behavior: none;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      position: fixed;
      inset: 0;
    }
    body.mobile-fullscreen {
      width: 100vw;
      height: var(--app-height, 100dvh);
    }
    #game {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: var(--app-height, 100dvh);
      background: #7bd7ff;
      cursor: crosshair;
      image-rendering: auto;
    }
    #rotate {
      position: fixed;
      left: 12px;
      right: 12px;
      top: max(12px, env(safe-area-inset-top));
      display: none;
      text-align: center;
      background: rgba(255,255,255,0.84);
      color: #12213a;
      font-weight: 900;
      font-size: 15px;
      padding: 10px 12px;
      border: 3px solid rgba(255,255,255,0.95);
      border-radius: 16px;
      z-index: 4;
      pointer-events: none;
      box-shadow: 0 10px 28px rgba(18,33,58,0.24);
    }
    @media (orientation: portrait) {
      #rotate { display: block; }
    }
    #codeInput, #chatInput {
      position: fixed;
      left: 16px;
      top: 16px;
      width: 190px;
      height: 42px;
      opacity: 0;
      pointer-events: none;
      border: 3px solid #ffffff;
      border-radius: 16px;
      outline: 0;
      background: #fff3a8;
      color: #182033;
      font-size: 18px;
      font-weight: 900;
      text-transform: lowercase;
      padding: 0 12px;
      z-index: 8;
    }
    #chatInput {
      width: 260px;
      text-transform: none;
    }
    #codeInput.active, #chatInput.active {
      opacity: 0.98;
      pointer-events: auto;
      box-shadow: 0 8px 22px rgba(24,32,51,0.22);
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <input id="codeInput" autocomplete="off" autocapitalize="none" spellcheck="false" inputmode="text" maxlength="8">
  <input id="chatInput" autocomplete="off" autocapitalize="sentences" spellcheck="true" inputmode="text" maxlength="64">
  <div id="rotate">Turn your phone sideways to play<br>Landscape mode works best.</div>
  <script>
    const canvas = document.getElementById("game");
    const codeInput = document.getElementById("codeInput");
    const chatInput = document.getElementById("chatInput");
    const ctx = canvas.getContext("2d");
    if ("serviceWorker" in navigator) {
      addEventListener("load", () => {
        navigator.serviceWorker.register("./super_kippah_sw.js?v=one-real-render-room-v3").catch(() => {});
      });
    }
    const W = 960;
    const H = 540;
    const TILE = 40;
    const LEVEL_COUNT = 18;
    const GRAVITY = 0.72;
    const MAX_FALL = 16;
    const SAVE_KEY = "superKippahPhoneSave";
    const SPONSOR_URL = "https://chapter11ready.com";

    let scale = 1;
    let offsetX = 0;
    let offsetY = 0;
    let viewportW = 960;
    let viewportH = 540;
    let controlScale = 1;
    let bigPhoneView = false;
    const touchDevice = (typeof matchMedia === "function" && matchMedia("(pointer: coarse)").matches) || (navigator.maxTouchPoints || 0) > 0;

    function clamp(min, max, value) {
      return Math.max(min, Math.min(max, value));
    }

    function resize() {
      const vw = Math.floor(window.visualViewport ? window.visualViewport.width : innerWidth);
      const vh = Math.floor(window.visualViewport ? window.visualViewport.height : innerHeight);
      viewportW = vw;
      viewportH = vh;
      if (document.documentElement.style && document.documentElement.style.setProperty) {
        document.documentElement.style.setProperty("--app-height", vh + "px");
      }
      const dprCap = touchDevice ? 2 : 3;
      const dpr = Math.max(1, Math.min(dprCap, window.devicePixelRatio || 1));
      canvas.width = Math.floor(vw * dpr);
      canvas.height = Math.floor(vh * dpr);
      canvas.style.width = vw + "px";
      canvas.style.height = vh + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const fitScale = Math.min(vw / W, vh / H);
      const fillScale = Math.max(vw / W, vh / H);
      const inFullscreen = !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
      bigPhoneView = touchDevice && (inFullscreen || document.body.classList.contains("mobile-fullscreen")) && vw > vh;
      scale = bigPhoneView ? Math.min(fillScale, fitScale * 1.22) : fitScale;
      offsetX = (vw - W * scale) / 2;
      offsetY = bigPhoneView ? Math.max(-42, (vh - H * scale) / 2) : (vh - H * scale) / 2;
      controlScale = clamp(0.72, 1.0, 430 / Math.max(390, vh));
      if (codeInput.classList.contains("active")) positionCodeInput();
      if (chatInput.classList.contains("active")) positionChatInput();
    }
    addEventListener("resize", resize);
    addEventListener("orientationchange", () => setTimeout(resize, 250));
    document.addEventListener("fullscreenchange", resize);
    document.addEventListener("webkitfullscreenchange", resize);
    if (window.visualViewport) window.visualViewport.addEventListener("resize", resize);
    resize();

    function requestGameFullscreen() {
      document.body.classList.add("mobile-fullscreen");
      clearInputState();
      const target = canvas.requestFullscreen ? canvas : document.documentElement;
      const fn = target.requestFullscreen || target.webkitRequestFullscreen || target.msRequestFullscreen;
      if (fn && !document.fullscreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
        try {
          const result = fn.call(target, { navigationUI: "hide" });
          if (result && result.catch) result.catch(() => {});
        } catch (error) {}
      }
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock("landscape").catch(() => {});
      }
      try { window.scrollTo(0, 1); } catch (error) {}
      setTimeout(resize, 80);
      setTimeout(resize, 350);
      setTimeout(() => {
        try { window.scrollTo(0, 1); } catch (error) {}
        resize();
      }, 900);
    }

    function startGame() {
      requestGameFullscreen();
      state.customMode = false;
      state.view3d = false;
      state.screen = "play";
      state.level = 0;
      state.inBonus = false;
      resetLevel();
    }

    function startCustomTest() {
      requestGameFullscreen();
      state.customMode = true;
      state.view3d = false;
      state.screen = "play";
      state.level = 0;
      state.inBonus = false;
      resetLevel();
      msg("Builder Test!");
    }

    function startRunner3D() {
      requestGameFullscreen();
      state.customMode = false;
      state.view3d = true;
      state.screen = "play";
      state.level = 0;
      state.inBonus = false;
      resetLevel();
      clearInputState();
      msg("3D Side Mode");
    }

    function openBuilder() {
      state.screen = "builder";
      state.builderCamera = 0;
      if (state.builderTool === "enemy") state.builderTool = "turtle";
      state.multiplayerAiPeers = [];
      clearInputState();
    }

    function toWorld(touch) {
      if (!scale) resize();
      return {
        x: (touch.clientX - offsetX) / scale,
        y: (touch.clientY - offsetY) / scale,
      };
    }

    const save = JSON.parse(localStorage.getItem(SAVE_KEY) || "{}");
    const state = {
      screen: "menu",
      coins: save.coins || 0,
      infinity: !!save.infinity,
      best: save.best || 0,
      skin: save.skin || 0,
      skinOwned: new Set(save.skinOwned || [0]),
      owned: new Set(save.owned || ["skyjump"]),
      ability: save.ability || "skyjump",
      noCooldown: !!save.noCooldown,
      camera: 0,
      level: 0,
      time: 0,
      message: "",
      messageTime: 0,
      touch: {},
      pressedButton: null,
      buttons: [],
      hudButtons: [],
      particles: [],
      shots: [],
      projectiles: [],
      targets: [],
      blasterTime: 0,
      blasterHits: 0,
      freezeTime: 0,
      starTime: 0,
      pipeCooldown: 0,
      lavaCountdown: 0,
      lavaTime: 0,
      lavaLastHour: "",
      respawnX: 120,
      respawnY: 240,
      inBonus: false,
      bonusReturnLevel: 0,
      bonusReturnX: 120,
      skinScroll: 0,
      abilityScroll: 0,
      menuScrollDrag: null,
      codeActive: false,
      codeText: "",
      searchActive: false,
      abilitySearch: "",
      multiplayer: false,
      multiplayerName: save.multiplayerName || "Player",
      multiplayerColor: save.multiplayerColor || "#74f7ff",
      multiplayerId: "",
      multiplayerPeers: {},
      multiplayerAiPeers: [],
      multiplayerStatus: "OFF",
      localTwoPlayer: !!save.localTwoPlayer,
      chatActive: false,
      chatDraft: "",
      chatMessages: [],
      chatScroll: 0,
      lastChat: "",
      lastChatTime: 0,
      pendingChat: "",
      twoPlayerCombo: 0,
      twoPlayerSpark: 0,
      sponsorHidden: false,
      builderUnlocked: !!save.builderUnlocked,
      builderTool: "brick",
      builderCamera: 0,
      customMode: false,
      view3d: false,
      customLevel: save.customLevel || { items: [] },
      runner3d: null,
    };
    const HEBREW_WORDS = ["תורה", "שלום", "אור", "חסד", "לב", "שיר"];
    const HEBREW_LETTERS = ["א", "ב", "ג", "ד", "ה", "ל", "מ", "ש", "ת"];

    function saveGame() {
      localStorage.setItem(SAVE_KEY, JSON.stringify({
        coins: state.coins,
        infinity: state.infinity,
        best: state.best,
        skin: state.skin,
        skinOwned: [...state.skinOwned],
        owned: [...state.owned],
        ability: state.ability,
        noCooldown: state.noCooldown,
        builderUnlocked: state.builderUnlocked,
        customLevel: state.customLevel,
        localTwoPlayer: state.localTwoPlayer,
        multiplayerName: state.multiplayerName,
        multiplayerColor: state.multiplayerColor,
      }));
    }

    let multiplayerSocket = null;
    let multiplayerLastSend = 0;
    let multiplayerPeer = null;
    let multiplayerPeerHost = false;
    let multiplayerPeerConns = [];
    const GLOBAL_MULTIPLAYER_URL = "wss://superkippahbros.onrender.com";
    const PEER_ROOM_ID = "super-kippah-bros-main-room-613";
    const CPU_PLAYER_NAMES = ["Ari", "Noam", "Lev", "Maya", "Eli", "Tali"];
    const CPU_PLAYER_COLORS = ["#ff7abf", "#ffd74a", "#7cffb2", "#a897ff", "#ffad7a", "#74f7ff"];

    function multiplayerUrl() {
      if (!location.hostname) return "ws://10.0.0.12:8765";
      if (location.protocol === "https:") return GLOBAL_MULTIPLAYER_URL;
      const proto = location.protocol === "https:" ? "wss://" : "ws://";
      if (location.port === "8000") return proto + location.hostname + ":8765";
      return proto + location.host;
    }

    function needsExternalMultiplayerServer() {
      return false;
    }

    function toggleMultiplayer() {
      if (state.multiplayer) {
        disconnectMultiplayer();
      } else {
        connectMultiplayer();
      }
    }

    function connectMultiplayer() {
      if (needsExternalMultiplayerServer()) {
        connectPeerMultiplayer();
        return;
      }
      if (multiplayerSocket && multiplayerSocket.readyState <= 1) return;
      state.multiplayerStatus = "CONNECTING";
      try {
        multiplayerSocket = new WebSocket(multiplayerUrl());
      } catch {
        state.multiplayerStatus = "FAILED";
        return;
      }
      const socket = multiplayerSocket;
      setTimeout(() => {
        if (socket === multiplayerSocket && socket.readyState !== WebSocket.OPEN) {
          state.multiplayer = false;
          state.multiplayerStatus = needsExternalMultiplayerServer() ? "SERVER NEEDED" : "SERVER OFF";
          state.multiplayerPeers = {};
          try { socket.close(); } catch {}
        }
      }, 3500);
      multiplayerSocket.addEventListener("open", () => {
        state.multiplayer = true;
        state.multiplayerStatus = "ONLINE";
        sendMultiplayerState(true);
        if (state.pendingChat) {
          const pending = state.pendingChat;
          state.pendingChat = "";
          sendChatMessage(pending, false);
        }
      });
      multiplayerSocket.addEventListener("message", event => {
        let data;
        try { data = JSON.parse(event.data); } catch { return; }
        handleMultiplayerPacket(data);
      });
      multiplayerSocket.addEventListener("close", () => {
        state.multiplayer = false;
        state.multiplayerStatus = "OFF";
        state.multiplayerId = "";
        state.multiplayerPeers = {};
      });
      multiplayerSocket.addEventListener("error", () => {
        state.multiplayerStatus = "SERVER OFF";
      });
    }

    function connectPeerMultiplayer() {
      if (multiplayerPeer && !multiplayerPeer.destroyed) return;
      if (!window.Peer) {
        state.multiplayerStatus = "LOAD FAILED";
        msg("Refresh and try connect");
        return;
      }
      state.multiplayerStatus = "CONNECTING";
      state.multiplayerPeers = {};
      multiplayerPeerConns = [];
      multiplayerPeerHost = false;

      const becomeClient = () => {
        try {
          multiplayerPeer = new Peer();
        } catch {
          state.multiplayerStatus = "FAILED";
          return;
        }
        multiplayerPeer.on("open", id => {
          state.multiplayerId = id;
          const conn = multiplayerPeer.connect(PEER_ROOM_ID, { reliable: true });
          setupPeerConnection(conn);
          setTimeout(() => {
            if (!state.multiplayer && state.multiplayerStatus === "CONNECTING") {
              state.multiplayerStatus = "NO ROOM";
              msg("Have one player connect first");
            }
          }, 4500);
        });
        multiplayerPeer.on("error", () => {
          if (!state.multiplayer) state.multiplayerStatus = "PEER OFF";
        });
      };

      try {
        multiplayerPeer = new Peer(PEER_ROOM_ID);
      } catch {
        becomeClient();
        return;
      }
      multiplayerPeer.on("open", id => {
        multiplayerPeerHost = true;
        state.multiplayer = true;
        state.multiplayerId = id;
        state.multiplayerStatus = "HOST ONLINE";
        sendMultiplayerState(true);
        if (state.pendingChat) {
          const pending = state.pendingChat;
          state.pendingChat = "";
          sendChatMessage(pending, false);
        }
      });
      multiplayerPeer.on("connection", setupPeerConnection);
      multiplayerPeer.on("error", err => {
        if (String(err && err.type) === "unavailable-id") {
          try { multiplayerPeer.destroy(); } catch {}
          multiplayerPeer = null;
          becomeClient();
        } else if (!state.multiplayer) {
          state.multiplayerStatus = "PEER OFF";
        }
      });
    }

    function setupPeerConnection(conn) {
      if (!conn) return;
      if (!multiplayerPeerConns.includes(conn)) multiplayerPeerConns.push(conn);
      conn.on("open", () => {
        state.multiplayer = true;
        state.multiplayerStatus = multiplayerPeerHost ? "HOST ONLINE" : "ONLINE";
        sendMultiplayerState(true);
        if (state.pendingChat) {
          const pending = state.pendingChat;
          state.pendingChat = "";
          sendChatMessage(pending, false);
        }
      });
      conn.on("data", data => {
        if (typeof data === "string") {
          try { data = JSON.parse(data); } catch { return; }
        }
        if (!data || typeof data !== "object") return;
        if (!data.id) data.id = conn.peer;
        if (multiplayerPeerHost) broadcastPeerPacket(data, conn);
        handleMultiplayerPacket(data);
      });
      conn.on("close", () => {
        multiplayerPeerConns = multiplayerPeerConns.filter(c => c !== conn);
        delete state.multiplayerPeers[conn.peer];
      });
      conn.on("error", () => {
        multiplayerPeerConns = multiplayerPeerConns.filter(c => c !== conn);
        delete state.multiplayerPeers[conn.peer];
      });
    }

    function broadcastPeerPacket(data, skip = null) {
      for (const conn of multiplayerPeerConns) {
        if (conn === skip || !conn.open) continue;
        try { conn.send(data); } catch {}
      }
    }

    function sendMultiplayerPacket(data) {
      data.id = state.multiplayerId || data.id || "player";
      data.time = Date.now() / 1000;
      if (multiplayerSocket && multiplayerSocket.readyState === WebSocket.OPEN) {
        multiplayerSocket.send(JSON.stringify(data));
        return true;
      }
      if (multiplayerPeer && !multiplayerPeer.destroyed && state.multiplayer) {
        if (multiplayerPeerHost) broadcastPeerPacket(data);
        else {
          const conn = multiplayerPeerConns.find(c => c.open);
          if (conn) conn.send(data);
        }
        return true;
      }
      return false;
    }

    function handleMultiplayerPacket(data) {
      if (data.type === "hello") {
        state.multiplayerId = data.id;
        return;
      }
      if (!data.id || data.id === state.multiplayerId) return;
      if (data.type === "leave") {
        delete state.multiplayerPeers[data.id];
        return;
      }
      if (data.type === "chat") {
        receiveChatMessage(data);
        return;
      }
      if (data.type === "state") {
        state.multiplayerPeers[data.id] = data;
      }
    }

    function disconnectMultiplayer() {
      if (multiplayerSocket) multiplayerSocket.close();
      multiplayerSocket = null;
      if (multiplayerPeer) {
        try { multiplayerPeer.destroy(); } catch {}
      }
      multiplayerPeer = null;
      multiplayerPeerHost = false;
      multiplayerPeerConns = [];
      state.multiplayer = false;
      state.multiplayerStatus = "OFF";
      state.multiplayerPeers = {};
    }

    function ensureAiMultiplayerPeers() {
      const target = 0;
      while (state.multiplayerAiPeers.length < target) {
        const index = state.multiplayerAiPeers.length;
        state.multiplayerAiPeers.push({
          id: "ai_" + index,
          name: CPU_PLAYER_NAMES[index % CPU_PLAYER_NAMES.length],
          color: CPU_PLAYER_COLORS[index % CPU_PLAYER_COLORS.length],
          x: 160 + index * 120,
          y: 240,
          vx: 0,
          vy: 0,
          facing: 1,
          powered: index % 2 === 0,
          skin: (index * 7 + 3) % skins.length,
          ability: abilities[(index * 11 + 2) % abilities.length].id,
          abilityTimer: 360 + index * 120,
          blockTimer: 20 + index * 30,
          level: state.level,
          screen: "play",
          ai: true,
          phase: Math.random() * 200,
          jumpTimer: 90 + index * 35,
          goalOffset: 180 + index * 95,
          stuckTimer: 0,
          lastX: 160 + index * 120,
          step: 0,
          crouching: false,
          emoteTimer: 80 + index * 25,
          emote: "",
          intent: "run",
          intentTimer: 0,
          targetX: 160 + index * 120,
        });
      }
      if (state.multiplayerAiPeers.length > target) state.multiplayerAiPeers.length = target;
    }

    function aiRect(bot) {
      return { x: bot.x, y: bot.y, w: 28, h: bot.powered ? 54 : 36 };
    }

    function aiSolids() {
      return level.blocks.concat(level.pipes, level.clouds);
    }

    function moveAiWithWorld(bot) {
      const body = aiRect(bot);
      const oldBottom = body.y + body.h;
      bot.x += bot.vx;
      body.x = bot.x;
      let hitWall = false;
      for (const solid of aiSolids()) {
        if (!rects(body, solid)) continue;
        hitWall = true;
        if (bot.vx > 0) bot.x = solid.x - body.w;
        else if (bot.vx < 0) bot.x = solid.x + solid.w;
        body.x = bot.x;
      }
      bot.vy = Math.min(MAX_FALL, bot.vy + GRAVITY);
      bot.y += bot.vy;
      body.y = bot.y;
      bot.grounded = false;
      for (const solid of aiSolids()) {
        if (!rects(body, solid)) continue;
        if (bot.vy >= 0 && oldBottom <= solid.y + 12) {
          bot.y = solid.y - body.h;
          body.y = bot.y;
          bot.vy = 0;
          bot.grounded = true;
        } else if (bot.vy < 0 && body.y >= solid.y) {
          bot.y = solid.y + solid.h;
          body.y = bot.y;
          bot.vy = 1.5;
          aiBumpBlock(bot, solid);
        }
      }
      if (hitWall) bot.vx *= -0.7;
      return body;
    }

    function aiBumpBlock(bot, block) {
      if (bot.blockTimer > 0 || !block || !level.blocks.includes(block)) return;
      bot.blockTimer = 65 + Math.random() * 50;
      if (block.type === "question" && !block.used) {
        block.used = true;
        bot.powered = true;
        bot.abilityTimer = Math.min(bot.abilityTimer, 40);
        addBurst(block.x + block.w / 2, block.y, "#d6f2ff", 16);
      } else if (block.type === "brick" && bot.powered) {
        block.dead = true;
        addBurst(block.x + block.w / 2, block.y + block.h / 2, "#b8642d", 18);
      }
    }

    function updateAiWorldInteractions(bot) {
      const body = aiRect(bot);
      for (const p of level.powerups) {
        if (!p.got && rects(body, p)) {
          p.got = true;
          bot.powered = true;
          addBurst(bot.x + 14, bot.y + body.h / 2, "#d6f2ff", 20);
        }
      }
      if (bot.grounded && bot.blockTimer <= 0 && Math.random() < 0.18) {
        const head = { x: bot.x + 4, y: bot.y - 18, w: 20, h: 18 };
        const block = level.blocks.find(b => (b.type === "question" || b.type === "brick") && rects(head, b));
        if (block) {
          bot.vy = -7.5;
          aiBumpBlock(bot, block);
        }
      }
      for (const e of level.enemies) {
        if (!e.alive) continue;
        const feet = { x: bot.x + 3, y: bot.y + body.h - 8, w: 22, h: 10 };
        if (rects(feet, e) && bot.vy > 0) {
          e.alive = false;
          bot.vy = -8;
          addBurst(e.x + e.w / 2, e.y, "#fff3a8", 18);
        }
      }
    }

    function useAiAbility(bot) {
      if (bot.abilityTimer > 0) return;
      bot.abilityTimer = 520 + Math.random() * 360;
      const cx = bot.x + 14;
      const cy = bot.y + (bot.powered ? 26 : 18);
      const dir = bot.facing || 1;
      const ability = bot.ability;
      const letterShot = (speed = 6.5, lift = -1.2) => {
        state.projectiles.push({ x: cx, y: cy, w: 18, h: 18, vx: dir * speed, vy: lift, life: 95, kind: "letter", text: HEBREW_LETTERS[Math.floor(Math.random() * HEBREW_LETTERS.length)] });
      };
      const makeCloud = () => level.clouds.push({ x: bot.x + dir * 42, y: Math.max(105, bot.y + (bot.powered ? 48 : 32)), w: 92, h: 20 });
      const defeatCloseEnemy = (radius = 105) => {
        for (const e of level.enemies) {
          if (e.alive && Math.abs(e.x - bot.x) < radius && Math.abs(e.y - bot.y) < 90) {
            e.alive = false;
            addBurst(e.x + e.w / 2, e.y, "#7cffb2", 16);
            return true;
          }
        }
        return false;
      };
      if (ability === "triple" || ability === "skyjump") {
        if (bot.grounded && Math.random() < 0.45) bot.vy = -10.5;
      } else if (ability === "dash" || ability === "tornado") {
        bot.vx = dir * 4.8;
        defeatCloseEnemy(145);
      } else if (ability === "missile" || ability === "blaster") {
        letterShot(8.2, -2.8);
      } else if (ability === "freeze" || ability === "magnet") {
        state.freezeTime = Math.max(state.freezeTime, 45);
        addBurst(cx, cy, "#d6f2ff", 14);
      } else if (ability === "heartboost" || ability === "star" || ability === "captain") {
        bot.powered = true;
        addBurst(cx, cy, "#ffd74a", 18);
      } else if (ability === "coinburst") {
        for (let i = 0; i < 3; i++) level.coins.push({ x: bot.x + dir * (35 + i * 22), y: bot.y - 25 - i * 12, got: false });
      } else {
        const roll = Math.floor(Math.random() * 3);
        if (roll === 0) letterShot();
        else if (roll === 1) makeCloud();
        else defeatCloseEnemy();
      }
    }

    function chooseAiIntent(bot, index) {
      if (bot.intentTimer > 0) {
        bot.intentTimer--;
        return;
      }
      const aheadMin = bot.x - 40;
      const aheadMax = bot.x + 420;
      const coin = level.coins
        .filter(c => !c.got && c.x >= aheadMin && c.x <= aheadMax && Math.abs(c.y - bot.y) < 140)
        .sort((a, b) => Math.abs(a.x - bot.x) - Math.abs(b.x - bot.x))[0];
      const question = level.blocks
        .filter(b => b.type === "question" && !b.used && b.x >= bot.x - 30 && b.x <= bot.x + 360 && Math.abs(b.y - bot.y) < 150)
        .sort((a, b) => Math.abs(a.x - bot.x) - Math.abs(b.x - bot.x))[0];
      const danger = level.enemies.find(e => e.alive && e.x > bot.x - 25 && e.x < bot.x + 150 && Math.abs(e.y - bot.y) < 70);
      if (danger) {
        bot.intent = "avoid";
        bot.targetX = danger.x - 42;
        bot.intentTimer = 45;
      } else if (question && Math.random() < 0.65) {
        bot.intent = "question";
        bot.targetX = question.x - 2;
        bot.intentTimer = 90;
      } else if (coin && Math.random() < 0.7) {
        bot.intent = "coin";
        bot.targetX = coin.x - 12;
        bot.intentTimer = 80;
      } else {
        bot.intent = "run";
        bot.targetX = clamp(120, level.flagX - 140, Math.max(player.x + bot.goalOffset, state.camera + 170 + index * 75));
        bot.intentTimer = 70 + Math.random() * 70;
      }
    }

    function updateAiMultiplayerPeers() {
      ensureAiMultiplayerPeers();
      if (!state.multiplayerAiPeers.length) return;
      for (const bot of state.multiplayerAiPeers) {
        bot.screen = state.screen;
        bot.level = state.level;
        if (state.screen !== "play") continue;
        const index = Number(bot.id.slice(3));
        if (bot.blockTimer > 0) bot.blockTimer--;
        if (bot.abilityTimer > 0) bot.abilityTimer--;
        if (Math.abs(bot.x - bot.lastX) < 0.25 && Math.abs(bot.vx) > 0.2) bot.stuckTimer++;
        else bot.stuckTimer = Math.max(0, bot.stuckTimer - 2);
        bot.lastX = bot.x;
        chooseAiIntent(bot, index);
        const targetX = clamp(100, level.flagX - 120, bot.targetX);
        const dx = targetX - bot.x;
        const desiredSpeed = bot.intent === "avoid" ? 1.75 : bot.intent === "coin" ? 1.15 : 1.28 + index * 0.05;
        const desired = Math.abs(dx) < 18 ? 0 : Math.sign(dx) * desiredSpeed;
        bot.vx += (desired - bot.vx) * 0.12;
        bot.vx = clamp(-2.0, 2.0, bot.vx);
        if (Math.abs(bot.vx) > 0.05) bot.facing = bot.vx >= 0 ? 1 : -1;
        bot.step += Math.abs(bot.vx) * 0.18;
        bot.crouching = bot.grounded && Math.abs(dx) < 42 && state.time % 180 > 138;
        bot.emoteTimer--;
        if (bot.emoteTimer <= 0) {
          bot.emote = ["!", "?", "go", "wow", "nice"][Math.floor(Math.random() * 5)];
          bot.emoteTimer = 220 + Math.random() * 180;
        }
        const body = moveAiWithWorld(bot);
        const probe = { x: bot.x + bot.facing * 34, y: bot.y + body.h + 4, w: 8, h: 8 };
        const hasFloorAhead = aiSolids().some(s => rects(probe, s));
        const wallProbe = { x: bot.x + bot.facing * 26, y: bot.y + 8, w: 8, h: body.h - 14 };
        const wallAhead = aiSolids().some(s => rects(wallProbe, s));
        if (bot.grounded) {
          bot.jumpTimer--;
          const wantsQuestion = bot.intent === "question" && Math.abs(dx) < 28;
          const needsJump = !hasFloorAhead || wallAhead || bot.stuckTimer > 45 || wantsQuestion;
          if (needsJump || bot.jumpTimer <= 0 && Math.abs(dx) > 180) {
            bot.vy = wantsQuestion ? -7.8 : needsJump ? -10.5 : -8.2;
            bot.jumpTimer = 95 + Math.random() * 120;
            bot.stuckTimer = 0;
          }
        }
        updateAiWorldInteractions(bot);
        useAiAbility(bot);
        level.blocks = level.blocks.filter(block => !block.dead);
        if (bot.x < state.camera - 260 || bot.x > state.camera + W + 480) {
          bot.x = clamp(100, level.flagX - 100, player.x + 240 + Math.random() * 360);
          bot.y = Math.min(bot.y, level.groundY - (bot.powered ? 54 : 36));
          bot.vy = 0;
        }
        if (bot.y > H + 100) {
          bot.x = Math.max(120, player.x + 120 + index * 60);
          bot.y = 180;
          bot.vy = 0;
        }
      }
    }

    function sendMultiplayerState(force = false) {
      if (!state.multiplayer) return;
      if (!force && state.time - multiplayerLastSend < 6) return;
      multiplayerLastSend = state.time;
      sendMultiplayerPacket({
        type: "state",
        name: state.multiplayerName,
        color: state.multiplayerColor,
        x: Math.round(player.x),
        y: Math.round(player.y),
        vx: Math.round(player.vx * 10) / 10,
        vy: Math.round(player.vy * 10) / 10,
        facing: player.facing,
        powered: player.powered,
        level: state.level,
        screen: state.screen,
        score: player.score,
        skin: state.skin,
      });

    function receiveChatMessage(data) {
      const text = String(data.text || "").replace(/[<>]/g, "").trim().slice(0, 64);
      if (!text) return;
      const name = String(data.name || "Player").replace(/[^a-zA-Z0-9 ]/g, "").trim().slice(0, 12) || "Player";
      addChatMessage({ name, text, time: state.time, color: data.color || "#74f7ff" });
      if (state.multiplayerPeers[data.id]) {
        state.multiplayerPeers[data.id].chat = text;
        state.multiplayerPeers[data.id].chatTime = state.time;
      }
    }

    function sendChatMessage(text, echo = true) {
      const clean = String(text || "").replace(/[<>]/g, "").trim().slice(0, 64);
      if (!clean) return;
      if (echo) {
        addChatMessage({ name: state.multiplayerName, text: clean, time: state.time, color: state.multiplayerColor });
        state.lastChat = clean;
        state.lastChatTime = state.time;
      }
      if (state.multiplayer) {
        sendMultiplayerPacket({
          type: "chat",
          name: state.multiplayerName,
          color: state.multiplayerColor,
          text: clean,
          level: state.level,
          screen: state.screen,
        });
      } else {
        state.pendingChat = clean;
        if (!multiplayerSocket || multiplayerSocket.readyState > 1) connectMultiplayer();
        msg("Connecting chat");
      }
    }

    function addChatMessage(message) {
      const wasAtBottom = state.chatScroll === 0;
      state.chatMessages.push(message);
      if (state.chatMessages.length > 30) state.chatMessages.shift();
      if (wasAtBottom) state.chatScroll = 0;
      else state.chatScroll = Math.min(maxChatScroll(), state.chatScroll + 1);
    }

    function maxChatScroll() {
      return Math.max(0, state.chatMessages.length - 2);
    }

    function scrollChat(dir) {
      state.chatScroll = clamp(0, maxChatScroll(), state.chatScroll + dir);
    }

    function cleanupMultiplayerPeers() {
      const now = Date.now() / 1000;
      for (const id of Object.keys(state.multiplayerPeers)) {
        if (now - (state.multiplayerPeers[id].time || 0) > 8) delete state.multiplayerPeers[id];
      }
    }

    function realOnlineCount() {

        codeInput.value = "";

        msg("No ability cooldown!");

        case "mysteryclone": for (const b of level.blocks.filter(b => b.type === "question" && Math.abs(b.x - player.x) < 420).slice(0, 4)) makeBrick(b.x + dir * 52, b.y, "question"); break;

        case "mysteryoven": for (let i = 0; i < 3; i++) { makeBrick(player.x + dir * (80 + i * 54), level.groundY - 2 * TILE, "question"); coin(player.x + dir * (92 + i * 54), level.groundY - 3 * TILE); } break;

        case "flagboomerang": level.flagX = Math.max(player.x + 720, level.flagX - 320); player.vx = -dir * 8; player.score += 300; break;
        case "levelslingshot": player.x = Math.min(level.flagX - 180, player.x + dir * 520); player.vy = -10; player.invuln = Math.max(player.invuln, 160); break;

    function useHundredSurpriseAbility(ability, ctx) {
      const { cx, cy, dir, nearEnemies, makeLetter, makeBrick, cloud, coin } = ctx;
      const family = ability.family;
      const form = ability.form;
      const colors = {
        aurora: "#74f7ff", comet: "#ffad3d", bubble: "#bae6fd", crystal: "#a7f3d0", echo: "#d8c0ff",
        galaxy: "#a897ff", laser: "#ff4f67", pogo: "#7cffb2", royal: "#ffd74a", storm: "#d6f2ff",
      };
      const color = colors[family] || "#fff3a8";
      const strength = { kick: 1, ladder: 2, sprout: 3, bridge: 4, portal: 5, mirror: 6, fountain: 7, cloud: 8, gate: 9, drum: 10 }[form] || 1;

      if (family === "aurora") {
        const count = 4 + (strength % 5);
        for (let i = 0; i < count; i++) makeLetter(HEBREW_LETTERS[(i + strength) % HEBREW_LETTERS.length], dir * (4 + i * 0.8), -3 + i * 0.55, cx, cy - 45 + i * 14, 115);
        if (form === "ladder" || form === "bridge") for (let i = 0; i < 6; i++) cloud(player.x + dir * (55 + i * 72), Math.max(90, player.y - 96 + Math.sin(i) * 24), 78, 18);
        if (form === "gate" || form === "mirror") player.x = Math.min(level.flagX - 120, Math.max(70, player.x + dir * (form === "mirror" ? -260 : 360)));
        if (form === "fountain") for (let i = 0; i < 12; i++) coin(player.x - 120 + i * 24, player.y - 105 + Math.sin(i) * 35);
        player.vy = Math.min(player.vy, form === "kick" || form === "pogo" ? -15 : -8);
        addBurst(cx, cy, color, 34);
        return true;
      }
      if (family === "comet") {
        const drops = form === "drum" || form === "fountain" ? 9 : form === "portal" ? 6 : 4;
        for (let i = 0; i < drops; i++) {
          makeLetter("*", dir * (1.2 + i * 0.12), 7 + (i % 3) * 0.35, player.x + dir * (80 + i * 58), 22 + i * 11, 125);
          if (i % 2 === 0) addBurst(player.x + dir * (80 + i * 58), Math.max(65, player.y - 190 + i * 12), color, 6);
        }
        if (form === "bridge") for (let i = 0; i < 6; i++) makeBrick(player.x + dir * (80 + i * TILE), level.groundY - TILE * (2 + i % 2));
        if (form === "sprout") for (let i = 0; i < 4; i++) makeBrick(player.x + dir * (80 + i * 52), Math.max(105, player.y - 120 - i * 18), "question");
        if (form === "portal") { player.x = Math.min(level.flagX - 130, player.x + dir * 230); cloud(player.x - 45, player.y + player.h + 18, 125, 22); }
        player.vx = dir * (form === "kick" ? 16 : 5);
        addBurst(cx, cy, color, 42);
        return true;
      }
      if (family === "bubble") {
        player.invuln = Math.max(player.invuln, 180 + strength * 10);
        for (const e of nearEnemies.slice(0, 6)) { e.vx = 0; e.vy = -3; addBurst(e.x + e.w / 2, e.y + e.h / 2, color, 16); }
        if (form === "cloud" || form === "bridge") for (let i = 0; i < 5; i++) cloud(player.x + dir * (55 + i * 85), player.y + 45 - (i % 2) * 30, 100, 22);
        if (form === "fountain") for (let i = 0; i < 8; i++) coin(player.x - 70 + i * 22, player.y - 80 - Math.random() * 80);
        if (form === "gate") { player.y = Math.max(70, player.y - 180); player.vy = 0; }
        cloud(player.x - 40, player.y + player.h + 18, 135, 24);
        return true;
      }
      if (family === "crystal") {
        const type = form === "ladder" || form === "fountain" || form === "cloud" ? "question" : "brick";
        for (let i = 0; i < 4 + strength % 6; i++) makeBrick(player.x + dir * (60 + i * 46), Math.max(110, player.y - 90 + (i % 3) * 38), type);
        if (form === "sprout") for (let i = 0; i < 7; i++) coin(player.x + dir * (45 + i * 26), Math.max(75, player.y - 120 - Math.sin(i) * 34));
        if (form === "portal") { player.x = Math.min(level.flagX - 140, player.x + dir * 300); player.y = Math.max(70, player.y - 75); addBurst(player.x, player.y, color, 28); }
        if (form === "mirror") for (const b of level.blocks) if ((b.type === "brick" || b.type === "question") && Math.abs(b.x - player.x) < 260) b.type = b.type === "brick" ? "question" : "brick";
        addBurst(cx, cy, color, 36);
        return true;
      }
      if (family === "echo") {
        const repeat = (fn, delay) => setTimeout(fn, delay);
        player.airJumps = Math.max(player.airJumps, 4);
        player.vy = -12;
        repeat(() => { player.vy = Math.min(player.vy, -10); addBurst(player.x + player.w / 2, player.y + player.h / 2, color, 20); }, 160);
        if (form === "portal" || form === "drum") repeat(() => { for (let i = 0; i < 5; i++) makeLetter("ה", dir * (5 + i * 0.4), -1.5 + i * 0.2, cx, cy - 30 + i * 14, 105); }, 240);
        if (form === "bridge" || form === "ladder") repeat(() => { for (let i = 0; i < 4; i++) makeBrick(player.x + dir * (70 + i * TILE), player.y + player.h + 34); }, 180);
        if (form === "fountain") repeat(() => { for (let i = 0; i < 8; i++) coin(player.x - 80 + i * 24, player.y - 70); }, 220);
        if (form === "gate") repeat(() => { player.x = Math.min(level.flagX - 120, player.x + dir * 260); }, 180);
        return true;
      }
      if (family === "galaxy") {
        for (const e of nearEnemies) { e.x += (cx - e.x) * 0.55; e.vy = -7; }
        state.starTime = Math.max(state.starTime, 150 + strength * 10);
        if (form === "gate") player.x = Math.min(level.flagX - 160, player.x + dir * 620);
        else if (form === "mirror") player.x = Math.max(70, player.x - dir * 420);
        else player.y = Math.max(70, player.y - 150);
        if (form === "cloud" || form === "bridge") cloud(player.x - 60, player.y + player.h + 25, 180, 26);
        addBurst(cx, cy, color, 60);
        return true;
      }
      if (family === "laser") {
        const spread = form === "fountain" || form === "drum" ? 5 : 2;
        for (let i = -spread; i <= spread; i++) makeLetter("ל", dir * (8 + strength * 0.3), i * 0.55, cx, cy + i * 12, 85);
        if (form === "sprout") for (let i = 0; i < 4; i++) makeBrick(player.x + dir * (72 + i * 45), Math.max(95, player.y - 86 - i * 12), "question");
        if (form === "portal") { player.x = Math.min(level.flagX - 135, player.x + dir * 250); makeLetter("שער", dir * 2.5, -4, cx, cy, 130); }
        player.vx = dir * (form === "kick" ? 15 : 4);
        addBurst(cx, cy, color, 30);
        return true;
      }
      if (family === "pogo") {
        player.vy = -18 - (form === "kick" ? 3 : 0);
        player.airJumps = Math.max(player.airJumps, 5);
        for (const e of nearEnemies) { e.vy = -13; e.vx += dir * 3; }
        if (form === "ladder" || form === "bridge") for (let i = 0; i < 6; i++) makeBrick(player.x + dir * (55 + i * 42), level.groundY - (1 + i % 5) * TILE);
        if (form === "fountain") for (let i = 0; i < 10; i++) coin(player.x + dir * (40 + i * 24), player.y - 100 - i * 8);
        addBurst(cx, player.y + player.h, color, 42);
        return true;
      }
      if (family === "royal") {
        const gain = form === "fountain" ? 12 : form === "gate" ? 7 : 4;
        state.coins += gain;
        player.score += gain * 120;
        saveGame();
        if (form === "sprout") { player.invuln = Math.max(player.invuln, 160); for (let i = 0; i < 5; i++) coin(player.x + dir * (45 + i * 30), player.y - 80 - i * 8); }
        if (form === "ladder" || form === "bridge") for (let i = 0; i < 5; i++) { makeBrick(player.x + dir * (70 + i * TILE), level.groundY - (2 + i % 2) * TILE, "question"); coin(player.x + dir * (80 + i * TILE), level.groundY - 130); }
        if (form === "gate") level.flagX = Math.max(player.x + 700, level.flagX - 260);
        addBurst(cx, cy, color, 45);
        return true;
      }
      if (family === "storm") {
        state.freezeTime = Math.max(state.freezeTime, 120 + strength * 8);
        for (const e of nearEnemies.slice(0, 6)) { e.vx = dir * (5 + strength * 0.3); e.vy = -9; if (form === "drum" || form === "portal") { e.alive = false; player.score += 240; } }
        if (form === "portal" || form === "fountain") for (let i = 0; i < 7; i++) makeLetter("ר", 0, 6 + (i % 2), player.x - 150 + i * 55, 25 + i * 8, 120);
        if (form === "cloud") for (let i = 0; i < 6; i++) cloud(player.x + dir * (60 + i * 82), Math.max(90, player.y - 110 + i % 2 * 24), 95, 22);
        player.invuln = Math.max(player.invuln, 90);
        addBurst(cx, cy, color, 50);
        return true;
      }

      if (form === "kick") {
        player.vx = dir * (9 + strength);
        player.vy = -7 - (family === "pogo" ? 5 : 0);
        player.invuln = Math.max(player.invuln, 50 + strength * 5);
      } else if (form === "ladder") {
        for (let i = 1; i <= 4 + strength % 4; i++) makeBrick(player.x + dir * (64 + strength * 4), level.groundY - i * TILE, family === "crystal" ? "question" : "brick");
      } else if (form === "sprout") {
        for (let i = 0; i < 3 + strength % 5; i++) {
          makeBrick(player.x + dir * (54 + i * 44), Math.max(95, player.y - 76 - i * 20), i % 2 ? "brick" : "question");
          coin(player.x + dir * (66 + i * 44), Math.max(70, player.y - 110 - i * 18));
        }
      } else if (form === "bridge") {
        for (let i = 0; i < 5 + strength % 4; i++) makeBrick(player.x + dir * (62 + i * TILE), player.y + player.h + 36 - (i % 2) * 14);
      } else if (form === "portal") {
        player.x = Math.min(level.flagX - 150, Math.max(70, player.x + dir * (190 + strength * 26)));
        player.y = Math.max(70, player.y - 55);
        cloud(player.x - 45, player.y + player.h + 18, 130, 24);
        for (let i = 0; i < 4; i++) makeLetter("פ", dir * (3 + i), -2, cx, cy - i * 12, 90);
      } else if (form === "mirror") {
        player.x = Math.max(70, Math.min(level.flagX - 120, player.x - dir * (160 + strength * 18)));
        player.vx = dir * 7;
        player.invuln = Math.max(player.invuln, 100);
      } else if (form === "fountain") {
        for (let i = 0; i < 8 + strength; i++) coin(player.x - 90 + i * 24, player.y - 40 - Math.sin(i) * 45);
      } else if (form === "cloud") {
        for (let i = 0; i < 3 + strength % 5; i++) cloud(player.x + dir * (70 + i * 95), Math.max(90, player.y - 80 - (i % 2) * 28), 100 + strength * 5, 24);
      } else if (form === "gate") {
        player.x = Math.min(level.flagX - 180, player.x + dir * (260 + strength * 28));
        cloud(player.x - 50, Math.max(100, player.y + 60), 140, 26);
      } else if (form === "drum") {
        for (const e of nearEnemies.slice(0, 2 + strength % 5)) {
          e.alive = family !== "bubble";
          e.vy = -10 - strength * 0.4;
          e.vx = dir * (3 + strength * 0.3);
          if (!e.alive) player.score += 220;
          addBurst(e.x + e.w / 2, e.y + e.h / 2, color, 18);
        }
        state.freezeTime = Math.max(state.freezeTime, family === "storm" ? 120 : state.freezeTime);
      }

      if (family === "aurora") {
        for (let i = 0; i < 5; i++) makeLetter(HEBREW_LETTERS[i % HEBREW_LETTERS.length], dir * (5 + i), -1 + i * 0.2, cx, cy - 20 + i * 9, 90);
      } else if (family === "comet") {
        missile(cx + dir * 120, -25, Math.max(90, player.y + player.h));
      } else if (family === "bubble") {
        player.invuln = Math.max(player.invuln, 180);
      } else if (family === "crystal") {
        makeBrick(player.x + dir * 120, Math.max(105, player.y - 82), "question");
      } else if (family === "echo") {
        player.airJumps = Math.max(player.airJumps, 3);
      } else if (family === "galaxy") {
        state.starTime = Math.max(state.starTime, 120);
      } else if (family === "laser") {
        for (let i = -2; i <= 2; i++) makeLetter("ל", dir * 9, i * 0.55, cx, cy + i * 10, 70);
      } else if (family === "pogo") {
        player.vy = Math.min(player.vy, -15);
      } else if (family === "royal") {
        state.coins += 2;
        saveGame();
      } else if (family === "storm") {
        state.freezeTime = Math.max(state.freezeTime, 90);
      }
      addBurst(cx, cy, color, 28);
      return true;
    }

    function useMegaSurpriseAbility(id) {
      if (!megaSurpriseIds.has(id) && !oddSurpriseIds.has(id)) return false;
      const cx = player.x + player.w / 2;
      const cy = player.y + player.h / 2;
      const dir = player.facing;
      const nearEnemies = level.enemies.filter(e => e.alive && Math.abs(e.x - player.x) < 420 && Math.abs(e.y - player.y) < 240);
      const makeLetter = (text, vx, vy, x = cx, y = cy, life = 95) => state.projectiles.push({ x, y, w: 24, h: 24, vx, vy, life, kind: "letter", text });
      const makeBrick = (x, y, type = "brick") => level.blocks.push({ x: Math.round(x / TILE) * TILE, y: Math.round(y / TILE) * TILE, w: TILE, h: TILE, type, used: false, powerup: type === "question", temp: true });
      if (oddSurpriseIds.has(id)) {
        if (!useOddSurpriseAbility(id, { cx, cy, dir, nearEnemies, makeLetter, makeBrick })) return false;
        player.cooldown = balancedAbilityCooldown(id, 520);

    function spawnTarget() {
      state.targets.push({
        x: state.camera + 140 + Math.random() * (W - 280),
        y: 110 + Math.random() * 260,
        s: 34,
        vx: (Math.random() < 0.5 ? -1 : 1) * (1.2 + Math.random() * 2),
        life: 190,
      });
    }

    function rememberTouch(id, p) {
      p.frame = state.time;
      state.touch[id] = p;
      if (joystick.id === id) joystick.lastFrame = state.time;
    }

    function touchDown(e) {
      if (window.PointerEvent) return;
      e.preventDefault();
      for (const t of e.changedTouches) {
        if (handleSponsorPress(t.clientX, t.clientY)) continue;
        const p = toWorld(t);
        rememberTouch(t.identifier, p);
        beginMenuScrollDrag(t.identifier, p);
        if ((state.screen === "play" || state.screen === "runner3d") && pointInRect(p.x, p.y, joystickZone()) && !pointInRect(p.x, p.y, jumpRect()) && !pointInRect(p.x, p.y, powerRect()) && !pointInRect(p.x, p.y, fireRect()) && !pointInRect(p.x, p.y, crouchRect()) && !joystick.active) {
          joystick.active = true;
          joystick.id = t.identifier;
          joystick.baseX = p.x;
          joystick.baseY = p.y;
          joystick.knobX = p.x;
          joystick.knobY = p.y;
          joystick.lastFrame = state.time;
        }
        pressAt(p.x, p.y);
      }
    }
    function touchMove(e) {
      if (window.PointerEvent) return;
      e.preventDefault();
      for (const t of e.changedTouches) {
        const p = toWorld(t);
        rememberTouch(t.identifier, p);
        updateMenuScrollDrag(t.identifier, p);
        if (joystick.active && joystick.id === t.identifier) {
          joystick.knobX = p.x;
          joystick.knobY = p.y;
          joystick.lastFrame = state.time;
        }
      }
      updateTouchControls();
    }
    function touchUp(e) {
      if (window.PointerEvent) return;
      e.preventDefault();
      for (const t of e.changedTouches) {
        if (joystick.id === t.identifier) {
