      }
      r.objects = r.objects.filter(o => o.z > -140 && o.z < 1420 && !o.hit);
      if (worldSpeed > 0) r.score += 1;
      if (r.messageTime > 0) r.messageTime--;
      if (r.lanePulse > 0) r.lanePulse--;
    }

    function update() {
      state.time++;
      if (state.screen === "finished") {
        if (state.time % 45 === 0) launchConfetti();
        updateParticles();
        return;
      }
      if (state.screen === "builder") {
        updateBuilder();
        return;
      }
      if (state.screen === "runner3d") {
        updateRunner3D();
        return;
      }
      if (state.screen !== "play") return;
      updateHourlyLava();
      updateTouchControls();
      if (controls.left) {
        player.vx -= player.crouching ? 0.42 : 0.8;
        player.facing = -1;
      }
      if (controls.right) {
        player.vx += player.crouching ? 0.42 : 0.8;
        player.facing = 1;
      }
      if (!controls.left && !controls.right) player.vx *= player.grounded ? 0.78 : 0.93;
      const maxVx = player.crouching ? 2.8 : 6;
      player.vx = Math.max(-maxVx, Math.min(maxVx, player.vx));

      const jumpDown = controls.jump || controls.up;
      const jumpPressed = jumpDown && !player.jumpWasDown;
      if (jumpPressed && player.grounded) {
        player.vy = -13;
        player.grounded = false;
        player.airJumps = 1;
        addBurst(player.x + player.w / 2, player.y + player.h, "#ffffff", 10);
      } else if (jumpPressed && !player.grounded && player.airJumps > 0) {
        player.vy = -12.2;
        player.airJumps--;
        addBurst(player.x + player.w / 2, player.y + player.h / 2, "#d6f2ff", 20);
        msg("Double!");
      } else if (jumpDown && state.ability === "jetpack" && state.owned.has("jetpack") && player.fuel > 0 && !player.grounded) {
        player.vy = Math.max(-8, player.vy - 0.68);
        player.fuel = Math.max(0, player.fuel - 1.35);
        addBurst(player.x + player.w / 2, player.y + player.h, "#ffad3d", 2);
      }
      player.jumpWasDown = jumpDown;
      const firePressed = controls.fire && !player.fireWasDown;
      player.fireWasDown = controls.fire;
      if (player.grounded) player.fuel = Math.min(100, player.fuel + 1.8);
      if (player.grounded) player.airJumps = 1;
      setCrouch(controls.down && player.grounded);
      if (controls.down && !player.grounded) player.vy = Math.min(MAX_FALL, player.vy + 1.1);
      if (controls.down && player.grounded) tryEnterPipe();
      if (controls.ability) {
        controls.ability = false;
        useAbility();
      }
      if (firePressed) shootLetter();
      if (player.cooldown > 0) player.cooldown--;
      if (player.invuln > 0) player.invuln--;
      if (player.shootCooldown > 0) player.shootCooldown--;
      if (player.flipTime > 0) player.flipTime--;
      if (state.freezeTime > 0) state.freezeTime--;
      if (state.starTime > 0) state.starTime--;
      if (state.pipeCooldown > 0) state.pipeCooldown--;

      movePlayer();
      updateSecondPlayer();
      updateFlowers();
      updateEnemies();
      updateShots();
      updateProjectiles();
      updateCoins();
      updatePowerups();
      updateTargets();
      updateParticles();
      updateAiMultiplayerPeers();
      sendMultiplayerState();
      const focusX = state.localTwoPlayer ? (player.x + player2.x) / 2 : player.x;
      const focusVx = state.localTwoPlayer ? (player.vx + player2.vx) / 2 : player.vx;
      const targetCamera = Math.max(0, Math.min(focusX - W * 0.36 + focusVx * 12, level.width - W));
      state.camera += (targetCamera - state.camera) * 0.16;
      if (player.y > H + 120) hurtPlayer();
      if (state.lavaTime > 0 && player.y + player.h > lavaTopY()) {
        hurtPlayer();
      }
      if (state.localTwoPlayer) updateTwoPlayerFun();
      if (player.x > level.flagX || (state.localTwoPlayer && player2.x > level.flagX)) {
        state.best = Math.max(state.best, currentRunScore());
        if (state.inBonus) {
          returnFromBonus();
          return;
        }
        state.level++;
        if (state.level >= LEVEL_COUNT) {
          state.screen = "finished";
          launchConfetti();
          saveGame();
          return;
        }
        saveGame();
        resetLevel(true);
        msg(state.localTwoPlayer ? "Team Clear!" : "Next Level!");
      }
      if (state.messageTime > 0) state.messageTime--;
    }

    function updateTwoPlayerFun() {
      const dx = Math.abs((player.x + player.w / 2) - (player2.x + player2.w / 2));
      const dy = Math.abs((player.y + player.h / 2) - (player2.y + player2.h / 2));
      if (dx < 70 && dy < 58) {
        state.twoPlayerCombo++;
        if (state.twoPlayerCombo > 75 && state.twoPlayerCombo % 75 === 0) {
          player.invuln = Math.max(player.invuln, 45);
          player2.invuln = Math.max(player2.invuln, 45);
          player.score += 50;
          player2.score += 50;
          state.twoPlayerSpark = 34;
          addBurst((player.x + player2.x) / 2 + 16, Math.min(player.y, player2.y), "#fff3a8", 28);
          msg("Team Boost!");
        }
      } else {
        state.twoPlayerCombo = Math.max(0, state.twoPlayerCombo - 3);
      }
      if (state.twoPlayerSpark > 0) state.twoPlayerSpark--;

      const far = player2.x - player.x;
      if (Math.abs(far) > W * 0.78) {
        const behind = far > 0 ? player : player2;
        const ahead = far > 0 ? player2 : player;
        behind.x += (ahead.x - Math.sign(far) * 190 - behind.x) * 0.04;
        if (behind.grounded) behind.vx += Math.sign(far) * 0.35;
      }
    }

    function updateHourlyLava() {
      const now = new Date();
      const hourKey = now.getFullYear() + "-" + now.getMonth() + "-" + now.getDate() + "-" + now.getHours();
      if (now.getMinutes() === 5 && state.lavaLastHour !== hourKey && state.lavaCountdown <= 0 && state.lavaTime <= 0) {
        state.lavaLastHour = hourKey;
        state.lavaCountdown = 180;
        msg("Lava in 3!");
      }
      if (state.lavaCountdown > 0) {
        state.lavaCountdown--;
        if (state.lavaCountdown === 120) msg("Lava in 2!");
        if (state.lavaCountdown === 60) msg("Lava in 1!");
        if (state.lavaCountdown === 0) {
          state.lavaTime = 1200;
          msg("LAVA FLOW!");
        }
      } else if (state.lavaTime > 0) {
        state.lavaTime--;
        if (state.time % 8 === 0) addBurst(state.camera + Math.random() * W, lavaTopY() + 12, "#ff6b35", 1);
      }
    }

    function lavaTopY() {
      if (state.lavaTime <= 0) return H + 80;
      const age = 1200 - state.lavaTime;
      const rise = Math.min(1, age / 90);
      const fall = Math.min(1, state.lavaTime / 90);
      return level.groundY + 12 - 22 * Math.min(rise, fall);
    }

    function updateBuilder() {
      if (keys.a || keys.A || keys.ArrowLeft) state.builderCamera = Math.max(0, state.builderCamera - 16);
      if (keys.d || keys.D || keys.ArrowRight) state.builderCamera = Math.min(120 * TILE - W, state.builderCamera + 16);
    }

    function placeBuilderItem(x, y) {
      if (y > H - 92 || y < 72) return;
      const tx = Math.max(1, Math.min(116, Math.floor((x + state.builderCamera) / TILE)));
      const row = Math.max(3, Math.min(10, Math.floor(y / TILE)));
      const items = state.customLevel.items;
      const same = it => it.tx === tx && it.row === row;
      if (state.builderTool === "turn") {
        const item = items.slice().reverse().find(same);
        if (item) {
          item.dir = ((item.dir || 0) + 1) % 4;
          msg("Turned!");
          saveGame();
        }
        return;
      }
      for (let i = items.length - 1; i >= 0; i--) if (same(items[i])) items.splice(i, 1);
      if (state.builderTool !== "erase") items.push({ type: state.builderTool, tx, row, dir: 0 });
      saveGame();
    }

    function clearBuilderLevel() {
      state.customLevel.items = [];
      saveGame();
      msg("Builder cleared");
    }

    function shootLetter() {
      shootLetterFrom(player, "#d6f2ff");
    }

    function shootSecondLetter() {
      shootLetterFrom(player2, "#55dfff");
    }

    function shootLetterFrom(actor, color) {
      if (!actor.powered || actor.shootCooldown > 0) return;
      actor.shootCooldown = 22;
      const letter = HEBREW_LETTERS[Math.floor(Math.random() * HEBREW_LETTERS.length)];
      state.projectiles.push({ x: actor.x + actor.w / 2 + actor.facing * 18, y: actor.y + actor.h / 2 - 4, w: 22, h: 22, vx: actor.facing * 7.2, vy: -0.5, life: 90, kind: "letter", text: letter, owner: actor === player2 ? "p2" : "p1" });
      addBurst(actor.x + actor.w / 2 + actor.facing * 14, actor.y + actor.h / 2, color, 8);
    }

    function tryEnterPipe() {
      if (state.pipeCooldown > 0) return;
      const center = player.x + player.w / 2;
      const pipe = level.pipes.find(p => center > p.x && center < p.x + p.w && Math.abs(player.y + player.h - p.y) < 12);
      if (!pipe) return;
      if (state.inBonus) returnFromBonus();
      else enterBonus(pipe);
    }

    function enterBonus(pipe) {
      state.bonusReturnLevel = state.level;
      state.bonusReturnX = Math.min(level.flagX - TILE * 8, pipe.x + TILE * 16);
      state.inBonus = true;
      resetLevel(true);
      msg("Underground!");
    }

    function returnFromBonus() {
      state.inBonus = false;
      state.level = state.bonusReturnLevel;
      const keep = { score: player.score, lives: player.lives, powered: player.powered, w: player.w, h: player.h, fuel: player.fuel };
      resetLevel(true);
      player.x = Math.max(TILE * 3, state.bonusReturnX);
      player.y = 240;
      player.score = keep.score;
      player.lives = keep.lives;
      player.powered = keep.powered;
      player.w = keep.w;
      player.h = keep.h;
      player.fuel = keep.fuel;
      state.camera = Math.max(0, player.x - W * 0.35);
      state.pipeCooldown = 60;
      msg("Warp!");
    }

    function standingHeight() {
      return player.powered ? 54 : 36;
    }

    function crouchHeight() {
      return player.powered ? 36 : 28;
    }

    function setCrouch(crouch) {
      if (crouch && !player.crouching) {
        const oldH = player.h;
        player.crouching = true;
        player.h = crouchHeight();
        player.y += oldH - player.h;
      } else if (!crouch && player.crouching) {
        const oldH = player.h;
        const newH = standingHeight();
        const oldY = player.y;
        player.y -= newH - oldH;
        player.h = newH;
        const blocked = level.blocks.concat(level.pipes).some(b => rects(player, b));
        if (blocked) {
          player.y = oldY;
          player.h = oldH;
        } else {
          player.crouching = false;
        }
      }
    }

    function actorStandingHeight(actor) {
      return actor.powered ? 54 : 36;
    }

    function actorCrouchHeight(actor) {
      return actor.powered ? 36 : 28;
    }

    function setActorCrouch(actor, crouch) {
      if (crouch && !actor.crouching) {
        const oldH = actor.h;
        actor.crouching = true;
        actor.h = actorCrouchHeight(actor);
        actor.y += oldH - actor.h;
      } else if (!crouch && actor.crouching) {
        const oldH = actor.h;
        const newH = actorStandingHeight(actor);
        const oldY = actor.y;
        actor.y -= newH - oldH;
        actor.h = newH;
        const blocked = level.blocks.concat(level.pipes).some(b => rects(actor, b));
        if (blocked) {
          actor.y = oldY;
          actor.h = oldH;
        } else {
          actor.crouching = false;
        }
      }
    }

    function moveActor(actor, canHitBlocks = false) {
      actor.x += actor.vx;
      actor.x = Math.max(0, Math.min(level.width - actor.w, actor.x));
      for (const b of level.blocks.concat(level.pipes)) {
        if (rects(actor, b)) {
          if (actor.vx > 0) actor.x = b.x - actor.w;
          if (actor.vx < 0) actor.x = b.x + b.w;
          actor.vx = 0;
        }
      }
      const oldBottom = actor.y + actor.h;
      actor.vy = Math.min(MAX_FALL, actor.vy + GRAVITY);
      actor.y += actor.vy;
      actor.grounded = false;
      for (const b of level.blocks.concat(level.pipes)) {
        if (!rects(actor, b)) continue;
        if (actor.vy > 0) {
          actor.y = b.y - actor.h;
          actor.vy = 0;
          actor.grounded = true;
        } else if (actor.vy < 0) {
          actor.y = b.y + b.h;
          actor.vy = 0;
          if (canHitBlocks && b.type === "question" && !b.used) {
            b.used = true;
            level.powerups.push({ x: b.x + 7, y: b.y + b.h - 4, startY: b.y + b.h - 4, targetY: b.y - 28, w: 26, h: 24, vx: 0, vy: 0, life: 0, emerging: true });
            addBurst(b.x + b.w / 2, b.y, "#d6f2ff", 16);
            msg("P2 Tefillin!");
          } else if (canHitBlocks && b.type === "brick" && actor.powered) {
            b.dead = true;
            actor.score += 50;
            addBurst(b.x + b.w / 2, b.y + b.h / 2, "#b8642d", 24);
          }
        }
      }
      level.blocks = level.blocks.filter(block => !block.dead);
      for (const c of level.clouds) {
        if (actor.vy >= 0 && oldBottom <= c.y + 8 && rects(actor, c)) {
          actor.y = c.y - actor.h;
          actor.vy = 0;
          actor.grounded = true;
        }
      }
    }

    function updateSecondPlayer() {
      if (!state.localTwoPlayer) return;
      if (controls2.left) {
        player2.vx -= player2.crouching ? 0.42 : 0.8;
        player2.facing = -1;
      }
      if (controls2.right) {
        player2.vx += player2.crouching ? 0.42 : 0.8;
        player2.facing = 1;
      }
      if (!controls2.left && !controls2.right) player2.vx *= player2.grounded ? 0.78 : 0.93;
      const maxVx = player2.crouching ? 2.8 : 6;
      player2.vx = Math.max(-maxVx, Math.min(maxVx, player2.vx));
      const jumpDown = controls2.jump || controls2.up;
      const jumpPressed = jumpDown && !player2.jumpWasDown;
      if (jumpPressed && player2.grounded) {
        player2.vy = -13;
        player2.grounded = false;
        player2.airJumps = 1;
        addBurst(player2.x + player2.w / 2, player2.y + player2.h, "#ffffff", 10);
      } else if (jumpPressed && !player2.grounded && player2.airJumps > 0) {
        player2.vy = -12.2;
        player2.airJumps--;
        addBurst(player2.x + player2.w / 2, player2.y + player2.h / 2, "#d6f2ff", 18);
      }
      player2.jumpWasDown = jumpDown;
      if (player2.grounded) player2.airJumps = 1;
      setActorCrouch(player2, controls2.down && player2.grounded);
      if (controls2.down && !player2.grounded) player2.vy = Math.min(MAX_FALL, player2.vy + 1.1);
      if (player2.invuln > 0) player2.invuln--;
      if (player2.shootCooldown > 0) player2.shootCooldown--;
      if (player2.flipTime > 0) player2.flipTime--;
      const firePressed = controls2.fire && !player2.fireWasDown;
      player2.fireWasDown = controls2.fire;
      if (firePressed) shootSecondLetter();
      moveActor(player2, true);
      updateSecondPlayerWorld();
      if (player2.y > H + 120 || (state.lavaTime > 0 && player2.y + player2.h > lavaTopY())) hurtSecondPlayer();
    }

    function updateSecondPlayerWorld() {
      for (const c of level.coins) {
        if (!c.got && Math.abs(player2.x + player2.w / 2 - c.x) < 28 && Math.abs(player2.y + player2.h / 2 - c.y) < 32) {
          c.got = true;
          state.coins++;
          player2.score += 100;
          addBurst(c.x, c.y, "#ffd74a", 8);
          saveGame();
        }
      }
      for (const p of level.powerups) {
        if (!p.dead && rects(player2, p)) {
          p.dead = true;
          growSecondPlayer();
        }
      }
      level.powerups = level.powerups.filter(p => !p.dead);
      for (const e of level.enemies) {
        if (!e.alive || !rects(player2, e)) continue;
        if (player2.vy > 2 && player2.y + player2.h - 8 < e.y + 12) {
          if (e.kind === "turtle" && !e.shell) {
            e.shell = true;
            e.vx = 0;
            player2.vy = -8;
          } else {
            e.alive = false;
            player2.vy = -7;
          }
          player2.score += 250;
          addBurst(e.x + e.w / 2, e.y, "#fff3a8", 14);
        } else {
          hurtSecondPlayer();
        }
      }
      for (const f of level.flowers) {
        if (f.alive && rects(player2, f)) hurtSecondPlayer();
      }
    }

    function growSecondPlayer() {
      if (player2.powered) return;
      player2.powered = true;
      player2.y -= 18;
      player2.w = 28;
      player2.h = 54;
      player2.score += 1000;
      addBurst(player2.x + player2.w / 2, player2.y + player2.h / 2, "#d6f2ff", 30);
    }

    function hurtSecondPlayer() {
      if (!state.localTwoPlayer || player2.invuln > 0) return;
      if (player2.powered) {
        player2.powered = false;
        player2.y += 18;
        player2.w = 24;
        player2.h = 36;
        player2.invuln = 120;
        addBurst(player2.x, player2.y, "#d6f2ff", 20);
        return;
      }
      player2.lives--;
      player2.invuln = 90;
      addBurst(player2.x, player2.y, "#55dfff", 20);
      if (player2.lives <= 0) {
        player2.lives = 3;
        player2.score = 0;
      }
      player2.x = Math.max(120, state.respawnX + 38);
      player2.y = Math.max(80, state.respawnY);
      player2.vx = 0;
      player2.vy = 0;
      player2.grounded = false;
      player2.crouching = false;
      player2.powered = false;
      player2.w = 24;
      player2.h = 36;
      player2.airJumps = 1;
      player2.jumpWasDown = false;
      player2.fireWasDown = false;
      player2.fuel = 100;
    }

    function movePlayer() {
      player.x += player.vx;
      for (const b of level.blocks.concat(level.pipes)) {
        if (rects(player, b)) {
          if (player.vx > 0) player.x = b.x - player.w;
          if (player.vx < 0) player.x = b.x + b.w;
          player.vx = 0;
        }
      }
      const oldBottom = player.y + player.h;
      player.vy = Math.min(MAX_FALL, player.vy + GRAVITY);
      player.y += player.vy;
      player.grounded = false;
      for (const b of level.blocks.concat(level.pipes)) collideY(b, oldBottom);
      for (const c of level.clouds) {
        if (player.vy >= 0 && oldBottom <= c.y + 8 && rects(player, c)) {
          player.y = c.y - player.h;
          player.vy = 0;
          player.grounded = true;
        }
      }
    }

    function collideY(b, oldBottom) {
      if (!rects(player, b)) return;
      if (player.vy > 0) {
        player.y = b.y - player.h;
        player.vy = 0;
        player.grounded = true;
      } else if (player.vy < 0) {
        player.y = b.y + b.h;
        player.vy = 0;
        if (b.type === "question" && !b.used) {
          b.used = true;
          const givesTefillin = !player.powered || b.powerup;
          if (givesTefillin) {
            level.powerups.push({ x: b.x + 7, y: b.y + b.h - 4, startY: b.y + b.h - 4, targetY: b.y - 28, w: 26, h: 24, vx: 0, vy: 0, life: 0, emerging: true });
            msg("Tefillin!");
          } else {
            state.coins++;
            player.score += 200;
          }
          addBurst(b.x + b.w / 2, b.y, givesTefillin ? "#d6f2ff" : "#ffd74a", 16);
          saveGame();
        } else if (b.type === "brick" && player.powered) {
          b.dead = true;
          player.score += 50;
          addBurst(b.x + b.w / 2, b.y + b.h / 2, "#b8642d", 24);
        }
      }
      level.blocks = level.blocks.filter(block => !block.dead);
    }

    function updateEnemies() {
      for (const e of level.enemies) {
        if (!e.alive) continue;
        if (state.freezeTime > 0) {
          if (rects(player, e) && state.starTime > 0) {
            e.alive = false;
            player.score += 300;
            addBurst(e.x + e.w / 2, e.y, "#fff3a8", 22);
          }
          continue;
        }
        if (e.x < state.camera - 120 || e.x > state.camera + W + 120) continue;
        if (e.kind === "cloudrider") {
          e.x += e.vx;
          e.y = e.baseY + Math.sin(state.time / 26 + e.x * 0.02) * 7;
          e.patrol--;
          if (e.patrol <= 0 || e.x < 120 || e.x > level.flagX - 160) {
            e.vx *= -1;
            e.patrol = 80 + Math.random() * 70;
          }
          e.dropTimer--;
          if (e.dropTimer <= 0) {
            const dropped = makeEnemy(e.x + e.w / 2 - 14, e.y + e.h + 12, "spike");
            dropped.vx = e.vx * 0.35;
            dropped.vy = 1.5;
            level.enemies.push(dropped);
            addBurst(dropped.x + 14, dropped.y, "#9aa7c4", 12);
            e.dropTimer = 150 + Math.random() * 120;
          }
          if (rects(player, e)) {
            if (state.starTime > 0) {
              e.alive = false;
              player.score += 450;
              addBurst(e.x + e.w / 2, e.y, "#fff3a8", 26);
            } else {
              hurtPlayer();
              player.vy = -6;
            }
          }
          continue;
        }
        if (e.kind === "turtle" && e.shell && Math.abs(e.vx) < 0.1) {
          e.shellTimer--;
          if (e.shellTimer <= 0) {
            e.shell = false;
            e.h = 30;
            e.y -= 10;
            e.vx = (Math.random() < 0.5 ? -1 : 1) * 0.85;
          }
        }
        if (e.shellKickCooldown > 0) e.shellKickCooldown--;
        const wasBottom = e.y + e.h;
        e.x += e.vx;
        let hitWall = false;
        for (const b of enemySolids()) {
          if (rects(e, b)) {
            if (e.vx > 0) e.x = b.x - e.w;
            else if (e.vx < 0) e.x = b.x + b.w;
            hitWall = true;
          }
        }
        e.vy = Math.min(MAX_FALL, e.vy + GRAVITY);
        e.y += e.vy;
        e.grounded = false;
        for (const b of enemySolids()) {
          if (rects(e, b) && e.vy >= 0 && wasBottom <= b.y + 10) {
            e.y = b.y - e.h;
            e.vy = 0;
            e.grounded = true;
          }
        }
        if (e.grounded) {
          if (e.kind === "stone") {
            e.patrol--;
            if (e.patrol <= 0) {
              e.vy = -7.6;
              e.patrol = 55 + Math.random() * 45;
            }
          }
          const probeX = e.vx > 0 ? e.x + e.w + 3 : e.x - 3;
          const probeY = e.y + e.h + 5;
          if (e.kind === "turtle" && e.shell && Math.abs(e.vx) > 4) {
            if (hitWall) e.vx *= -1;
          } else if (hitWall || !solidAtPoint(probeX, probeY)) e.vx *= -1;
        } else if (hitWall) {
          e.vx *= -1;
        }
        if (e.kind === "turtle" && e.shell && Math.abs(e.vx) > 4) {
          for (const other of level.enemies) {
            if (other !== e && other.alive && rects(e, other)) {
              other.alive = false;
              player.score += 250;
              addBurst(other.x + other.w / 2, other.y + other.h / 2, "#7cffb2", 20);
            }
          }
        }
        if (e.y > H + 160) e.alive = false;
        if (rects(player, e)) {
          if (state.starTime > 0) {
            e.alive = false;
            player.score += 300;
            addBurst(e.x + e.w / 2, e.y, "#fff3a8", 22);
            continue;
          }
          if (player.vy > 2 && player.y + player.h - 8 < e.y + 10) {
            if (e.kind === "spike") {
              hurtPlayer();
              player.vy = -7;
              addBurst(e.x + e.w / 2, e.y, "#ff4f67", 16);
            } else if (e.kind === "turtle") {
              if (!e.shell) {
                e.shell = true;
                e.shellTimer = 520;
                e.shellKickCooldown = 14;
                e.h = 20;
                e.y += 10;
                e.vx = 0;
              } else if (Math.abs(e.vx) > 4) {
                e.vx = 0;
                e.shellTimer = 420;
                e.shellKickCooldown = 14;
              } else {
                e.vx = player.x + player.w / 2 < e.x + e.w / 2 ? 8.5 : -8.5;
                e.shellTimer = 420;
                e.shellKickCooldown = 16;
              }
            } else {
              e.alive = false;
            }
            player.vy = -9;
            player.score += 300;
            addBurst(e.x + e.w / 2, e.y, e.kind === "turtle" ? "#5abf57" : "#705642", 20);
          } else {
            if (e.kind === "turtle" && e.shell && e.shellKickCooldown > 0) {
              continue;
            }
            if (e.kind === "turtle" && e.shell && Math.abs(e.vx) < 0.1) {
              e.vx = player.x + player.w / 2 < e.x + e.w / 2 ? 8.5 : -8.5;
              e.shellTimer = 420;
              e.shellKickCooldown = 16;
              player.vx = -Math.sign(e.vx) * 3;
            } else {
              hurtPlayer();
            }
          }
        }
      }
    }

    function enemySolids() {
      return level.blocks.concat(level.pipes, level.clouds);
    }

    function solidAtPoint(x, y) {
      return enemySolids().some(b => x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h);
    }

    function updateFlowers() {
      for (const f of level.flowers) {
        if (!f.alive) continue;
        if (f.flash > 0) f.flash--;
        if (state.freezeTime > 0) continue;
        f.cooldown--;
        const cx = f.x + f.w / 2;
        const cy = f.y + f.h / 2;
        let target = player;
        if (state.localTwoPlayer) {
          const d1 = Math.abs(player.x + player.w / 2 - cx) + Math.abs(player.y + player.h / 2 - cy);
          const d2 = Math.abs(player2.x + player2.w / 2 - cx) + Math.abs(player2.y + player2.h / 2 - cy);
          if (d2 < d1) target = player2;
        }
        const pcx = target.x + target.w / 2;
        const pcy = target.y + target.h / 2;
        if (f.cooldown <= 0 && Math.abs(pcx - cx) < 520) {
          const angle = Math.atan2(pcy - cy, pcx - cx);
          const speed = 3.1 + Math.random() * 1.4;
          const word = HEBREW_WORDS[Math.floor(Math.random() * HEBREW_WORDS.length)];
          state.projectiles.push({ x: cx - 22, y: cy - 28, w: 44, h: 24, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 220, kind: "word", text: word });
          f.cooldown = 90 + Math.random() * 70;
        }
        if (rects(player, f)) hurtPlayer();
      }
    }

    function updateProjectiles() {
      for (const p of state.projectiles) {
        p.life--;
        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.kind === "word" ? 0.035 : 0.025;
        if (p.life <= 0) p.dead = true;
        const solids = level.blocks.concat(level.pipes);
        if (solids.some(b => rects(p, b))) {
          p.dead = true;
          addBurst(p.x + p.w / 2, p.y + p.h / 2, "#d6f2ff", 10);
          continue;
        }
        if (p.kind === "word" && (rects(player, p) || (state.localTwoPlayer && rects(player2, p)))) {
          if (state.localTwoPlayer && rects(player2, p)) hurtSecondPlayer();
          if (rects(player, p)) hurtPlayer();
          p.dead = true;
        }
        if (p.kind === "letter") {
          for (const e of level.enemies) {
            if (e.alive && rects(p, e)) {
              e.alive = false;
              p.dead = true;
              awardShotScore(p, 250);
              addBurst(e.x + e.w / 2, e.y + e.h / 2, "#d6f2ff", 22);
            }
          }
          for (const f of level.flowers) {
            if (f.alive && rects(p, f)) {
              f.health--;
              f.flash = 12;
              p.dead = true;
              addBurst(f.x + f.w / 2, f.y + f.h / 2, "#d6f2ff", 14);
              if (f.health <= 0) {
                f.alive = false;
                awardShotScore(p, 400);
                addBurst(f.x + f.w / 2, f.y + f.h / 2, "#f4e4bb", 34);
              }
            }
          }
        }
      }
      state.projectiles = state.projectiles.filter(p => !p.dead && p.x > state.camera - 200 && p.x < state.camera + W + 260 && p.y < H + 140).slice(-80);
    }

    function awardShotScore(projectile, amount) {
      if (projectile.owner === "p2" && state.localTwoPlayer) player2.score += amount;
      else player.score += amount;
    }

    function launchConfetti() {
      const colors = ["#ff4f67", "#ffd74a", "#5abf57", "#2778df", "#f5b83b", "#d6f2ff"];
      for (let i = 0; i < 50; i++) {
        state.particles.push({
          x: 80 + Math.random() * (W - 160),
          y: -120 + Math.random() * 160,
          vx: -2.2 + Math.random() * 4.4,
          vy: 1 + Math.random() * 4,
          life: 130 + Math.random() * 80,
          color: colors[Math.floor(Math.random() * colors.length)],
        });
      }
    }

    function hurtPlayer() {
      if (player.invuln > 0) return;
      if (player.powered) {
        player.powered = false;
        player.y += 18;
        player.w = 24;
        player.h = 36;
        player.invuln = 120;
        addBurst(player.x, player.y, "#d6f2ff", 24);
        msg("Small again!");
        return;
      }
      player.lives--;
      player.invuln = 90;
      addBurst(player.x, player.y, "#ff4f67", 22);
      if (player.lives <= 0) {
        state.best = Math.max(state.best, currentRunScore());
        saveGame();
        state.screen = "menu";
      } else {
        respawnAtLevelStart();
      }
    }

    function respawnAtLevelStart() {
      player.x = Math.max(80, state.respawnX || 120);
      player.y = Math.max(80, state.respawnY || 240);
      player.vx = 0;
      player.vy = 0;
      player.grounded = false;
      player.crouching = false;
      player.powered = false;
      player.w = 24;
      player.h = 36;
      player.airJumps = 1;
      player.jumpWasDown = false;
      player.fireWasDown = false;
      player.shootCooldown = 0;
      player.invuln = 120;
      player.fuel = 100;
      state.camera = 0;
      state.shots.length = 0;
      state.projectiles.length = 0;
      state.targets.length = 0;
      state.blasterTime = 0;
      state.freezeTime = 0;
      state.starTime = 0;
      msg("Try again!");
    }

    function updateCoins() {
      for (const c of level.coins) {
        if (!c.got && Math.abs(player.x + player.w / 2 - c.x) < 28 && Math.abs(player.y + player.h / 2 - c.y) < 32) {
          c.got = true;
          state.coins++;
          player.score += 100;
          addBurst(c.x, c.y, "#ffd74a", 12);
          saveGame();
        }
      }
    }

    function updatePowerups() {
      for (const p of level.powerups) {
        p.life++;
        if (p.emerging) {
          p.y -= 1.15;
          if (p.y <= p.targetY) {
            p.y = p.targetY;
            p.emerging = false;
            p.vx = 1.15;
            p.vy = 0;
          }
          continue;
        }
        p.x += p.vx;
        for (const b of level.blocks.concat(level.pipes)) {
          if (rects(p, b)) {
            if (p.vx > 0) p.x = b.x - p.w;
            if (p.vx < 0) p.x = b.x + b.w;
            p.vx *= -1;
          }
        }
        p.vy = Math.min(6, p.vy + 0.26);
        p.y += p.vy;
        for (const b of level.blocks.concat(level.pipes)) {
          if (rects(p, b) && p.vy > 0) {
            p.y = b.y - p.h;
            p.vy = 0;
          }
        }
        if (rects(player, p)) {
          p.got = true;
          growPlayer();
        }
      }
      level.powerups = level.powerups.filter(p => !p.got && p.y < H + 100);
    }

    function growPlayer() {
      if (player.powered) return;
      player.powered = true;
      player.y -= 18;
      player.w = 28;
      player.h = 54;
      player.score += 1000;
      addBurst(player.x + player.w / 2, player.y + player.h / 2, "#d6f2ff", 34);
      msg("Hat on!");
    }

    function updateShots() {
      for (const s of state.shots) {
        if (s.kind === "missile") {
          s.y += s.vy;
          if (s.y >= s.targetY) explode(s.x, s.y);
        } else if (s.kind === "shield") {
          s.life--;
          s.x += s.vx;
          s.y += s.vy;
          if (s.life < 70) s.returning = true;
          if (s.returning) {
            s.vx += Math.max(-0.7, Math.min(0.7, (player.x - s.x) * 0.035));
            s.vy += Math.max(-0.7, Math.min(0.7, (player.y - s.y) * 0.035));
          }
          if (Math.abs(s.x - player.x) < 25 && Math.abs(s.y - player.y) < 40 && s.returning) s.dead = true;
        }
        for (const e of level.enemies) {
          if (e.alive && Math.abs(s.x - e.x) < 40 && Math.abs(s.y - e.y) < 38) {
            e.alive = false;
            player.score += 250;
            addBurst(e.x, e.y, "#d6f2ff", 18);
            if (s.kind === "missile") explode(s.x, s.y);
          }
        }
        if (s.kind === "shield") {
          for (const f of level.flowers) {
            if (f.alive && Math.abs(s.x - (f.x + f.w / 2)) < 46 && Math.abs(s.y - (f.y + f.h / 2)) < 48) {
              f.health--;
              f.flash = 14;
              s.returning = true;
              player.score += 120;
              addBurst(f.x + f.w / 2, f.y + f.h / 2, "#d6f2ff", 18);
              if (f.health <= 0) {
                f.alive = false;
                player.score += 400;
                addBurst(f.x + f.w / 2, f.y + f.h / 2, "#f4e4bb", 36);
              }
            }
          }
        }
      }
      state.shots = state.shots.filter(s => !s.dead && s.y < H + 80 && s.life !== 0);
    }

    function explode(x, y) {
      addBurst(x, y, "#ff4f67", 45);
      for (const e of level.enemies) {
        if (e.alive && Math.hypot(e.x - x, e.y - y) < 120) {
          e.alive = false;
          player.score += 350;
        }
      }
      for (const s of state.shots) if (s.kind === "missile" && Math.abs(s.x - x) < 5) s.dead = true;
    }

    function updateTargets() {
      if (state.blasterTime <= 0) return;
      state.blasterTime--;
      if (state.blasterTime % 35 === 0 && state.targets.length < 6) spawnTarget();
      for (const t of state.targets) {
        t.x += t.vx;
        t.life--;
      }
      state.targets = state.targets.filter(t => t.life > 0);
    }

    function updateParticles() {
      for (const p of state.particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.12;
        p.life--;
      }
      state.particles = state.particles.filter(p => p.life > 0).slice(-160);
    }

    function drawRect(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
    }

    function drawPixelBox(x, y, w, h, fill, dark = "#182033", light = "rgba(255,255,255,0.55)") {
      drawRect(x, y, w, h, dark);
      drawRect(x + 3, y + 3, w - 6, h - 6, fill);
      drawRect(x + 5, y + 5, w - 10, 3, light);
      drawRect(x + 5, y + 5, 3, h - 10, light);
      drawRect(x + 5, y + h - 9, w - 10, 4, "rgba(0,0,0,0.2)");
      drawRect(x + w - 9, y + 5, 4, h - 10, "rgba(0,0,0,0.18)");
    }

    function drawPixelSparkle(x, y, color = "rgba(255,255,255,0.7)") {
      drawRect(x, y + 2, 2, 2, color);
      drawRect(x + 2, y, 2, 6, color);
      drawRect(x + 4, y + 2, 2, 2, color);
    }

    function draw() {
      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const dpr = canvas.width / Math.max(1, innerWidth);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.imageSmoothingEnabled = false;
      const outer = ctx.createLinearGradient(0, 0, 0, viewportH);
      outer.addColorStop(0, "#66c7ff");
      outer.addColorStop(1, "#e8fbff");
      ctx.fillStyle = outer;
      ctx.fillRect(0, 0, viewportW, viewportH);
      ctx.save();
      const fillScale = Math.max(viewportW / W, viewportH / H);
      ctx.globalAlpha = 0.45;
      ctx.translate((viewportW - W * fillScale) / 2, (viewportH - H * fillScale) / 2);
      ctx.scale(fillScale, fillScale);
      drawBackground((state.time % 4200) / 4200, state.camera || 0);
      ctx.restore();
      ctx.save();
      ctx.translate(offsetX, offsetY);
      ctx.scale(scale, scale);
      if (state.screen === "menu") drawMenu();
      else if (state.screen === "builder") drawBuilder();
      else if (state.screen === "finished") drawFinished();
      else if (state.screen === "runner3d") drawRunner3D();
      else drawGame();
      ctx.restore();
      drawPortalChrome();
      ctx.restore();
    }

    function runnerProject(lane, z, lift = 0) {
      const depth = clamp(0, 1, 1 - z / 1220);
      const scale3 = 0.9 + depth * 0.32;
      return {
        x: 146 + z * 0.64,
        y: 424 + lane * 26 - lift * scale3,
        s: scale3,
        depth,
      };
    }

    function drawRunner3D() {
      const r = state.runner3d || (resetRunner3D(), state.runner3d);
      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, "#f7cf44");
      sky.addColorStop(0.42, "#ffe98e");
      sky.addColorStop(1, "#d99d36");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H);
      drawRect(0, 0, W, H, "rgba(255,246,176,0.18)");
      draw3DSun();
      for (let i = 0; i < 4; i++) draw3DCloud(150 + i * 230 - (state.time * 0.11 + i * 31) % 130, 78 + (i % 2) * 34, 0.55 + (i % 3) * 0.12);
      draw3DTrack(r);
      const drawables = [
        ...r.objects.map(o => ({ kind: "object", z: o.z, data: o })),
        ...r.bots.map(b => ({ kind: "bot", z: b.z, data: b })),
        ...r.shots.map(s => ({ kind: "shot", z: s.z, data: s })),
        { kind: "player", z: 0, data: r },
      ].sort((a, b) => b.z - a.z);
      for (const item of drawables) {
        if (item.kind === "object") drawRunnerObject(item.data);
        else if (item.kind === "bot") drawRunnerBot(item.data);
        else if (item.kind === "shot") drawRunnerShot(item.data);
        else drawRunnerPlayer(r);
      }
      drawRunnerHud(r);
      drawControls();
    }

    function draw3DSun() {
      const x = 735 + Math.sin(state.time / 260) * 68;
      const y = 94 + Math.cos(state.time / 320) * 13;
      drawRect(x - 48, y - 48, 96, 96, "rgba(255,249,172,0.75)");
      drawRect(x - 31, y - 31, 62, 62, "#ffd33d");
    }

    function draw3DCloud(x, y, s) {
      drawRect(x, y + 18 * s, 92 * s, 18 * s, "rgba(255,244,180,0.58)");
      drawRect(x + 22 * s, y + 5 * s, 56 * s, 30 * s, "rgba(255,250,211,0.72)");
      drawRect(x + 12 * s, y + 35 * s, 72 * s, 6 * s, "rgba(187,141,49,0.28)");
    }

    function draw3DShadow(x, y, w, h, alpha = 0.22) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = "#6f4a1b";
      ctx.beginPath();
      ctx.ellipse(x, y, w, h, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawIsoBox(x, y, w, h, d, top, front, side) {
      ctx.fillStyle = side;
      ctx.beginPath();
      ctx.moveTo(x + w / 2, y - h - d);
      ctx.lineTo(x + w / 2 + d, y - h);
      ctx.lineTo(x + w / 2 + d, y);
      ctx.lineTo(x + w / 2, y - d);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = front;
      ctx.beginPath();
      ctx.moveTo(x - w / 2, y - h);
      ctx.lineTo(x + w / 2, y - h - d);
      ctx.lineTo(x + w / 2, y - d);
      ctx.lineTo(x - w / 2, y);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = top;
      ctx.beginPath();
      ctx.moveTo(x - w / 2, y - h);
      ctx.lineTo(x, y - h - d * 1.55);
      ctx.lineTo(x + w / 2 + d, y - h);
      ctx.lineTo(x + w / 2, y - h - d);
      ctx.closePath();
      ctx.fill();
    }

    function draw3DTrack(r) {
      drawRect(0, 420, W, H - 420, "#d2a13e");
      drawRect(0, 420, W, 18, "#f7d768");
      drawRect(0, 438, W, 12, "#a36b20");
      for (let z = 34 - (r.distance % 72); z < 1220; z += 72) {
        const p = runnerProject(0, z);
        const depth = p.depth;
        const tw = (34 + 22 * depth) * p.s;
        drawRect(p.x - tw / 2, 458 + (z % 3) * 18, tw, 10 * p.s, depth > 0.67 ? "#b9882a" : "rgba(177,126,35,0.52)");
        drawRect(p.x - tw / 2 + 12 * p.s, 502 + (z % 2) * 20, tw * 0.6, 8 * p.s, "rgba(125,82,24,0.26)");
      }
      for (const side of [-1, 1]) {
        for (let z = 20 - (r.distance % 145); z < 1220; z += 145) {
          const p = runnerProject(0, z);
          const px = p.x + side * (96 + (z % 3) * 24) * p.s;
          if (px < -80 || px > W + 80) continue;
          if (Math.floor((z + side * 13) / 105) % 2 === 0) draw3DTree(px, p.y, p.s * 0.9);
          else draw3DCactus(px, p.y, p.s * 0.88);
        }
      }
    }

    function draw3DCactus(x, y, s) {
      if (s < 0.22) return;
      draw3DShadow(x, y + 2 * s, 18 * s, 7 * s, 0.16);
      drawIsoBox(x, y, 17 * s, 46 * s, 8 * s, "#50d66f", "#219c51", "#177a3b");
      drawIsoBox(x - 17 * s, y - 12 * s, 11 * s, 22 * s, 5 * s, "#50d66f", "#219c51", "#177a3b");
      drawIsoBox(x + 17 * s, y - 20 * s, 11 * s, 26 * s, 5 * s, "#50d66f", "#219c51", "#177a3b");
    }

    function draw3DTree(x, y, s) {
      if (s < 0.2) return;
      draw3DShadow(x, y + 4 * s, 26 * s, 9 * s, 0.16);
      drawIsoBox(x, y, 16 * s, 42 * s, 8 * s, "#9c6326", "#724018", "#4e2d12");
      drawIsoBox(x - 3 * s, y - 44 * s, 54 * s, 30 * s, 18 * s, "#43bd61", "#23934b", "#18713a");
      drawIsoBox(x + 12 * s, y - 70 * s, 36 * s, 28 * s, 14 * s, "#5ed373", "#35a957", "#238243");
    }

    function drawRunnerObject(o) {
      const p = runnerProject(o.lane, o.z, o.type === "coin" ? 56 + Math.sin(state.time / 8 + o.bob) * 5 : 0);
      if (p.s < 0.18) return;
      if (o.type === "coin") {
        draw3DShadow(p.x, p.y + 4 * p.s, 15 * p.s, 5 * p.s, 0.16);
        drawIsoBox(p.x, p.y - 5 * p.s, 22 * p.s, 34 * p.s, 6 * p.s, "#fff091", "#ffd33d", "#a97910");
        drawRect(p.x - 2 * p.s, p.y - 31 * p.s, 4 * p.s, 22 * p.s, "#fff8c4");
      } else if (o.type === "block") {
        draw3DBrick(p.x, p.y, p.s * 1.08);
      } else if (o.type === "torah") {
        draw3DTorah(p.x, p.y, p.s * 1.08);
      } else if (o.type === "turtle") {
        draw3DTurtle(p.x, p.y, p.s * 1.08);
      } else if (o.type === "tefillin") {
        draw3DShadow(p.x, p.y + 4 * p.s, 24 * p.s, 8 * p.s, 0.25);
        drawIsoBox(p.x, p.y - 10 * p.s, 34 * p.s, 30 * p.s, 11 * p.s, "#333", "#0b0b0b", "#000");
        drawIsoBox(p.x, p.y + 18 * p.s, 15 * p.s, 42 * p.s, 7 * p.s, "#222", "#060606", "#000");
        drawRect(p.x - 11 * p.s, p.y - 30 * p.s, 22 * p.s, 5 * p.s, "#555");
      } else {
        drawRunnerBot({ lane: o.lane, z: o.z, y: 0, color: "#d9edff", skin: "Bot" });

    }

    function draw3DBrick(x, y, s) {
      draw3DShadow(x, y + 6 * s, 40 * s, 12 * s, 0.28);
      drawIsoBox(x, y, 58 * s, 38 * s, 16 * s, "#e6904b", "#b8642d", "#713a21");
      drawRect(x - 24 * s, y - 27 * s, 48 * s, 4 * s, "#713a21");
      drawRect(x - 5 * s, y - 37 * s, 5 * s, 14 * s, "#713a21");
      drawRect(x + 15 * s, y - 18 * s, 5 * s, 12 * s, "#713a21");
      drawRect(x - 21 * s, y - 33 * s, 14 * s, 4 * s, "#f1a25d");
    }

    function draw3DTorah(x, y, s) {
      draw3DShadow(x, y + 6 * s, 40 * s, 13 * s, 0.27);
      drawRect(x - 33 * s, y - 76 * s, 68 * s, 76 * s, "rgba(24,32,51,0.22)");
      drawIsoBox(x, y - 8 * s, 54 * s, 48 * s, 10 * s, "#fff9e8", "#f4ecd2", "#d6c79a");
      drawIsoBox(x - 27 * s, y - 3 * s, 10 * s, 61 * s, 5 * s, "#a46c36", "#7e4b22", "#5d3516");
      drawIsoBox(x + 27 * s, y - 3 * s, 10 * s, 61 * s, 5 * s, "#a46c36", "#7e4b22", "#5d3516");

      drawRect(x - 17 * s, y - 22 * s, 34 * s, 5 * s, "#62c8ff");

    function draw3DTurtle(x, y, s) {
      draw3DShadow(x, y + 5 * s, 42 * s, 13 * s, 0.27);
      drawRect(x - 32 * s, y - 50 * s, 76 * s, 54 * s, "rgba(24,32,51,0.18)");
      drawIsoBox(x - 3 * s, y, 52 * s, 28 * s, 13 * s, "#64de68", "#248f43", "#145b2c");
      drawIsoBox(x + 28 * s, y - 13 * s, 18 * s, 18 * s, 7 * s, "#8be57b", "#55bf5e", "#34823a");
      drawRect(x + 30 * s, y - 27 * s, 4 * s, 4 * s, "#111");
      drawRect(x - 21 * s, y - 5 * s, 12 * s, 7 * s, "#12361f");
      drawRect(x + 2 * s, y - 5 * s, 12 * s, 7 * s, "#12361f");
    }

    function drawRunnerBot(b) {
      const p = runnerProject(b.lane, b.z, b.y);
      if (p.s < 0.18) return;
      drawRunnerCharacter(p.x, p.y, p.s * 0.82, b.color || "#bff7d2", true);
    }

    function drawRunnerPlayer(r) {
      const p = runnerProject(r.lane, 0, r.y);
      if (r.invuln > 0 && Math.floor(state.time / 5) % 2 === 0) return;
      drawRunnerCharacter(p.x, p.y, 1.38, skins[state.skin]?.shirt || "#ff6b6b", r.hat || r.big);
    }

    function drawRunnerCharacter(x, y, s, shirt, hat) {
      const crouch = state.runner3d && state.runner3d.crouch > 0.5 && s > 1;
      const bodyH = crouch ? 34 : 54;
      draw3DShadow(x, y + 5 * s, 25 * s, 8 * s, 0.2);
      drawIsoBox(x, y, 38 * s, bodyH * s, 12 * s, mixColor(shirt, "#ffffff", 0.18), shirt, mixColor(shirt, "#000000", 0.28));
      drawIsoBox(x, y - bodyH * s, 34 * s, 29 * s, 10 * s, "#6a4228", skins[state.skin]?.skin || "#f1b08a", "#5a321e");
      if (hat) {
        drawIsoBox(x, y - (bodyH + 29) * s, 36 * s, 8 * s, 7 * s, "#2c2c2c", skins[state.skin]?.hat || "#111", "#050505");
        drawIsoBox(x, y - (bodyH + 36) * s, 20 * s, 6 * s, 5 * s, "#2c2c2c", "#111", "#050505");
      }
      drawRect(x - 8 * s, y - (bodyH + 14) * s, 4 * s, 4 * s, "#111");
      drawRect(x + 6 * s, y - (bodyH + 14) * s, 4 * s, 4 * s, "#111");
      drawIsoBox(x - 10 * s, y + 2 * s, 12 * s, 13 * s, 4 * s, "#ffffff", "#e8eef5", "#b8c3cf");
      drawIsoBox(x + 10 * s, y + 2 * s, 12 * s, 13 * s, 4 * s, "#ffffff", "#e8eef5", "#b8c3cf");
    }

    function drawRunnerShot(s) {
      const p = runnerProject(s.lane, s.z, 36);
      drawText("א", p.x, p.y, Math.max(12, 24 * p.s), "#1d3cff", "center");
    }

    function drawRunnerHud(r) {
      state.hudButtons = [];
      drawPanel(18, 16, 250, 42, "#d9edff");
      drawText("3D  Coins " + (state.infinity ? "INFINITE" : r.coins) + "   Score " + r.score, 34, 43, 13, "#182033");
      drawPanel(W - 246, 16, 228, 42, "#d9edff");
      drawPanel(W - 238, 22, 96, 30, "#ffad7a");
      drawText("R MENU", W - 190, 42, 10, "#182033", "center");
      drawPanel(W - 132, 22, 106, 30, "#fff3a8");
      drawText("RESTART", W - 79, 42, 10, "#182033", "center");
      state.hudButtons.push({ x: W - 238, y: 22, w: 96, h: 30, action: goToMenu });
      state.hudButtons.push({ x: W - 132, y: 22, w: 106, h: 30, action: resetRunner3D });
      for (let i = 0; i < r.lives; i++) drawHeart(28 + i * 24, 72);
      if (r.messageTime > 0) drawText(r.message, W / 2, 82, 22, "#182033", "center", "#fff3a8");
      drawText("Hold RIGHT to run. W jumps. S crouches. SHIFT shoots.", W / 2, H - 18, 12, "#182033", "center", "#d9edff");
    }

    function drawGame() {
      if (state.view3d) {
        drawGame3DSide();
        return;
      }
      const cam = state.camera;
      const phase = (state.time % 4200) / 4200;
      drawBackground(phase, cam);
      for (let i = 0; i < 8; i++) drawCloud(((i * 240 - cam * 0.15) % 1200) - 120, 55 + (i % 3) * 42, 0.7);
      for (const c of level.clouds) drawCloudPlatform(c.x - cam, c.y, c.w, c.h);
      for (const d of level.decorations) drawDecoration(d.x - cam, d.y, d.type);
      for (const b of level.blocks) drawBlock(b.x - cam, b.y, b);
      for (const p of level.pipes) drawPipe(p.x - cam, p.y, p.w, p.h);
      for (const c of level.coins) if (!c.got) drawCoin(c.x - cam, c.y);
      for (const p of level.powerups) drawTefillin(p.x - cam, p.y, p.emerging ? p.targetY + p.h - p.y : p.h);
      for (const f of level.flowers) drawFlower(f.x - cam, f.y, f);
      for (const e of level.enemies) if (e.alive) drawEnemy(e.x - cam, e.y, e.kind, e);
      for (const s of state.shots) drawShot(s.x - cam, s.y, s.kind);
      for (const p of state.projectiles) drawProjectile(p.x - cam, p.y, p);
      for (const t of state.targets) drawTarget(t.x - cam, t.y, t.s);
      drawLava(cam);
      drawPlayerShadow(player.x - cam, player.y);
      drawPlayer(player.x - cam, player.y);
      if (state.localTwoPlayer) drawSecondPlayer(player2.x - cam, player2.y);
      if (state.localTwoPlayer) drawTwoPlayerCrown(cam);
      drawLocalChatBubble(player.x - cam, player.y);
      drawMultiplayerPeers(cam);
      for (const p of state.particles) drawRect(p.x - cam, p.y, 5, 5, p.color);
      drawFlag(level.flagX - cam);
      drawHud();
      drawChatPanel();
      drawControls();
    }

    function drawGame3DSide() {
      const cam = state.camera;
      const phase = (state.time % 4200) / 4200;
      drawBackground(phase, cam);
      for (let i = 0; i < 8; i++) drawCloud(((i * 240 - cam * 0.15) % 1200) - 120, 55 + (i % 3) * 42, 0.7);
      ctx.save();
      ctx.globalAlpha = 0.22;
      for (let x = -cam % 56; x < W + 80; x += 56) {
        const a = project3DSide(x, level.groundY + 58, 0);
        const b = project3DSide(x + 24, level.groundY + 92, 0);
        drawRect(a.x, a.y, 28, 7, "#8a6427");
        drawRect(b.x, b.y, 38, 8, "#9f7430");
      }
      ctx.globalAlpha = 1;
      ctx.restore();
      for (const c of level.clouds) drawCloudPlatform(c.x - cam, c.y, c.w, c.h);
      for (const d of level.decorations) drawDecoration(d.x - cam, d.y, d.type);
      for (const b of level.blocks) drawBlock3DSide(b.x - cam, b.y, b);
      for (const p of level.pipes) drawPipe3DSide(p.x - cam, p.y, p.w, p.h);
      for (const c of level.coins) if (!c.got) drawCoin3DSide(c.x - cam, c.y);
      for (const p of level.powerups) drawTefillin3DSide(p.x - cam, p.y, p.emerging ? p.targetY + p.h - p.y : p.h);
      for (const f of level.flowers) drawFlower3DSide(f.x - cam, f.y, f);
      for (const e of level.enemies) if (e.alive) drawEnemy3DSide(e.x - cam, e.y, e.kind, e);
      for (const s of state.shots) drawShot(s.x - cam, s.y, s.kind);
      for (const p of state.projectiles) drawProjectile(p.x - cam, p.y, p);
      for (const t of state.targets) drawTarget(t.x - cam, t.y, t.s);
      drawLava(cam);
      drawPlayerShadow(player.x - cam, player.y);
      drawPlayer3DSide(player.x - cam, player.y);
      if (state.localTwoPlayer) drawSecondPlayer(player2.x - cam, player2.y);
      if (state.localTwoPlayer) drawTwoPlayerCrown(cam);
      drawLocalChatBubble(player.x - cam, player.y);
      drawMultiplayerPeers3DSide(cam);
      for (const p of state.particles) drawRect(p.x - cam, p.y, 5, 5, p.color);
      drawFlag3DSide(level.flagX - cam);
      drawText("3D SIDE", 22, 112, 11, "#182033", "left", "#fff3a8");
      drawHud();
      drawChatPanel();
      drawControls();
    }

    function project3DSide(x, y, z = 0) {
      const depth = z * 0.72;
      const ground = level && level.groundY ? level.groundY : 420;
      const heightLift = (ground - y) * 0.08;
      return {
        x: x + depth + heightLift + 16,
        y: 116 + y * 0.76 - depth * 0.46 + (x - W / 2) * -0.042,
      };
    }

    function drawPrism3DSide(x, y, w, h, d, top, front, side) {
      const p = project3DSide(x, y, 0);
      const q = project3DSide(x, y, d);
      drawRect(q.x, q.y - h, w, h, side);
      drawRect(p.x, p.y - h, w, h, front);
      ctx.fillStyle = top;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y - h);
      ctx.lineTo(q.x, q.y - h);
      ctx.lineTo(q.x + w, q.y - h);
      ctx.lineTo(p.x + w, p.y - h);
      ctx.closePath();
      ctx.fill();
    }

    function drawBlock3DSide(x, y, b) {
      if (b.type !== "ground" && (y < -TILE || y > H + TILE)) return;
      const depth = b.type === "ground" ? 18 : 14;
      if (b.type === "ground") {
        drawPrism3DSide(x, y + b.h, TILE, b.h, depth, "#65d96f", "#9b5f2c", "#3a1f10");
        const p = project3DSide(x, y, 0);
        const q = project3DSide(x, y, depth);
        drawRect(p.x, p.y, TILE, 12, "#2fbf57");
        drawRect(q.x, q.y, TILE, 12, "#65d96f");
        drawRect(p.x, p.y + 9, TILE + (q.x - p.x), 6, "#167d38");
        for (let yy = y + 24; yy < y + b.h; yy += 26) {
          const p1 = project3DSide(x + 7, yy, 0);
          const p2 = project3DSide(x + 25, yy + 10, 0);
          drawRect(p1.x, p1.y, 10, 5, "#70431d");
          drawRect(p2.x, p2.y, 8, 5, "#c07a35");
        }
        return;
      }
      const fill = b.type === "question" ? (b.used ? "#b8642d" : "#f3b23b") : "#b8642d";
      const dark = b.type === "question" ? "#713a21" : "#713a21";
      const light = b.type === "question" ? "#fff3a8" : "#f1a25d";
      drawPrism3DSide(x, y + b.h, b.w, b.h, depth, light, fill, dark);
      const p = project3DSide(x, y, 0);
      if (b.type === "question") {
        if (!b.used) drawRect(p.x + 8, p.y + 8, b.w - 16, 4, "#ffd96d");
        drawText("?", p.x + 21, p.y + 30, 24, "#fff9e8", "center");
      } else {
        drawRect(p.x + 3, p.y + 14, b.w - 5, 4, "#713a21");
        drawRect(p.x + 3, p.y + 28, b.w - 5, 4, "#713a21");
        drawRect(p.x + 6, p.y + 6, 10, 4, "#e6904b");
      }
    }

    function drawPipe3DSide(x, y, w, h) {
      const p = project3DSide(x, y, 0);
      const q = project3DSide(x, y, 16);
      drawRect(q.x - 4, q.y + 14, w + 8, h - 12, "#083e21");
      drawPipe(p.x, p.y, w, h);
      drawRect(q.x + w - 4, q.y + 3, 8, 20, "#0e5d2e");
      drawRect(q.x + w + 3, q.y - 8, 4, 18, "#91ffae");
    }

    function drawCoin3DSide(x, y) {
      const p = project3DSide(x, y, 10);
      const s = 1;
      draw3DShadow(p.x + 12, p.y + 33, 12, 4, 0.18);
      drawIsoBox(p.x + 12, p.y + 31, 18 * s, 27 * s, 5, "#fff3a8", "#ffd74a", "#986c12");
      drawRect(p.x + 10, p.y + 9, 5, 21, "#fff8c4");
    }

    function drawTefillin3DSide(x, y, visibleH = 24) {
      if (visibleH <= 0) return;
      const p = project3DSide(x, y, 10);
      ctx.save();
      ctx.beginPath();
      ctx.rect(p.x - 3, p.y + 25 - visibleH, 36, visibleH + 8);
      ctx.clip();
      drawIsoBox(p.x + 13, p.y + 25, 28, 24, 6, "#444", "#111", "#050505");
      drawIsoBox(p.x + 13, p.y + 39, 10, 14, 4, "#333", "#111", "#050505");
      ctx.restore();
    }

    function drawFlower3DSide(x, y, f) {
      const p = project3DSide(x, y, 10);
      draw3DShadow(p.x + 18, p.y + 58, 16, 5, 0.18);
      drawIsoBox(p.x + 18, p.y + 58, 13, 34, 5, "#56d776", "#1f9f4a", "#0e5d2e");
      drawIsoBox(p.x + 18, p.y + 24, 38, 22, 7, "#fff9e8", "#f4ecd2", "#c7b686");
      drawRect(p.x + 2, p.y + 20, 32, 5, "#8b5a2b");
      drawRect(p.x + 7, p.y + 31, 22, 4, "#62c8ff");
    }

    function drawEnemy3DSide(x, y, kind, enemy = null) {
      const p = project3DSide(x, y, 10);
      if (kind === "turtle") {
        draw3DTurtle(p.x + 15, p.y + (enemy && enemy.shell ? 25 : 32), 0.78);
        return;
      }
      if (kind === "cloudrider") {
        drawCloudPlatform(p.x - 12, p.y + 24, 58, 18);
        drawIsoBox(p.x + 16, p.y + 30, 26, 26, 6, "#8d7b66", "#5f4d3f", "#2b211b");
        drawRect(p.x + 8, p.y + 7, 5, 5, "#111");
        drawRect(p.x + 20, p.y + 7, 5, 5, "#111");
        drawRect(p.x + 10, p.y + 20, 13, 3, "#201510");
        drawRect(p.x + 1, p.y - 6, 32, 8, "#3b2b22");
        drawRect(p.x + 5, p.y - 12, 24, 7, "#57402f");
        return;
      }
      if (kind === "spike") {
        draw3DShadow(p.x + 14, p.y + 31, 18, 5, 0.22);
        drawIsoBox(p.x + 14, p.y + 28, 27, 22, 6, "#9ca3af", "#5f6b7a", "#202936");
        drawRect(p.x + 4, p.y - 2, 5, 9, "#d9edff");
        drawRect(p.x + 13, p.y - 7, 5, 12, "#d9edff");
        drawRect(p.x + 22, p.y - 2, 5, 9, "#d9edff");
        drawRect(p.x + 8, p.y + 11, 4, 4, "#111");
        drawRect(p.x + 20, p.y + 11, 4, 4, "#111");
        return;
      }
      const body = kind === "cloud" ? "#8b7a64" : kind === "stone" ? "#a15e2b" : "#705642";
      const dark = kind === "cloud" ? "#4f463d" : "#3a2112";
      draw3DShadow(p.x + 15, p.y + 34, 18, 5, 0.2);
      drawIsoBox(p.x + 15, p.y + 35, 31, 28, 7, mixColor(body, "#ffffff", 0.22), body, dark);
      drawRect(p.x + 7, p.y + 13, 5, 5, "#111");
      drawRect(p.x + 19, p.y + 13, 5, 5, "#111");
      drawRect(p.x + 10, p.y + 25, 12, 3, dark);
      drawIsoBox(p.x + 7, p.y + 39, 9, 6, 3, "#222", "#111", "#050505");
      drawIsoBox(p.x + 23, p.y + 39, 9, 6, 3, "#222", "#111", "#050505");
    }

    function drawPlayer3DSide(x, y) {
      const skin = skins[state.skin] || skins[0];
      const p = project3DSide(x, y, 12);
      drawCharacter3DSide(p.x, p.y, player.powered, player.crouching, player.facing, skin, 1);
    }

    function drawCharacter3DSide(x, y, powered, crouching, facing, skin, alpha = 1) {
      ctx.save();
      ctx.globalAlpha *= alpha;
      const h = crouching ? 30 : (powered ? 54 : 36);
      const headX = x + 14;
      const headY = crouching ? y + 7 : y + 1;
      const bodyTop = crouching ? y + 22 : (powered ? y + 22 : y + 20);
      draw3DShadow(x + 15, y + h + 6, 18, 5, 0.23);
      drawIsoBox(x + 15, y + h, 28, h - bodyTop + y, 7, mixColor(skin.shirt, "#ffffff", 0.2), skin.shirt, mixColor(skin.shirt, "#000000", 0.3));
      drawIsoBox(headX, headY + 26, 26, 25, 6, "#6a4228", skin.skin || "#f2c19b", "#5a321e");
      if (powered) {
        drawIsoBox(headX, headY + 4, 28, 7, 5, "#333", skin.hat || "#111", "#050505");
        drawIsoBox(headX, headY - 2, 18, 5, 4, "#222", "#111", "#050505");
      }
      drawRect(headX - 6 + facing * 2, headY + 11, 4, 4, "#111");
      drawRect(headX + 4 + facing * 2, headY + 11, 4, 4, "#111");
      drawRect(headX - 2, headY + 19, 7, 2, "#8b3f30");
      drawRect(headX - 13, headY + 12, 4, 18, "#2b1c17");
      drawRect(headX + 9, headY + 12, 4, 18, "#2b1c17");
      drawIsoBox(x + 9, y + h + 5, 10, 6, 3, "#ffffff", "#e8eef5", "#b8c3cf");
      drawIsoBox(x + 22, y + h + 5, 10, 6, 3, "#ffffff", "#e8eef5", "#b8c3cf");
      ctx.restore();
    }

    function drawMultiplayerPeers3DSide(cam) {
      cleanupMultiplayerPeers();
      const peers = [
        ...(state.multiplayer ? Object.values(state.multiplayerPeers) : []),
      ];
      for (const peer of peers) {
        if (peer.screen !== "play" || peer.level !== state.level) continue;
        const rawX = peer.x - cam;
        const rawY = peer.y;
        if (rawX < -80 || rawX > W + 80) continue;
        const p = project3DSide(rawX, rawY, 12);
        const skin = skins[Number.isFinite(peer.skin) ? peer.skin % skins.length : state.skin] || skins[0];
        drawCharacter3DSide(p.x, p.y, !!peer.powered, !!peer.crouching, peer.facing || 1, skin, peer.ai ? 0.94 : 0.76);
        const color = peer.color || skin.shirt || "#74f7ff";
        const label = (peer.name || "Player").slice(0, 10) + (peer.ai ? " bot" : "");
        drawText(label, p.x + 15, p.y - 10, peer.ai ? 8 : 9, color, "center", "#182033");
        if (!peer.ai && peer.chat && state.time - (peer.chatTime || 0) < 360) drawSmallChatBubble(peer.chat, p.x + 15, p.y - 34, color);
      }
    }

    function drawFlag3DSide(x) {
      const p = project3DSide(x, level.groundY, 12);
      drawIsoBox(p.x + 4, p.y, 10, 148, 5, "#8b5a2b", "#5b3519", "#3a2112");
      drawIsoBox(p.x + 32, p.y - 104, 58, 34, 6, "#fff3a8", "#ffd74a", "#b58a20");
      drawRect(p.x + 12, p.y - 112, 45, 4, "#ffffff");
    }

    function drawMultiplayerPeers(cam) {
      cleanupMultiplayerPeers();
      const peers = [
        ...(state.multiplayer ? Object.values(state.multiplayerPeers) : []),
      ];
      for (const peer of peers) {
        if (peer.screen !== "play" || peer.level !== state.level) continue;
        const x = peer.x - cam;
        const y = peer.y;
        if (x < -80 || x > W + 80) continue;
        drawGhostPlayer(x, y, peer);
      }
    }

    function drawGhostPlayer(x, y, peer) {
      ctx.save();
      ctx.globalAlpha = peer.solid ? 1 : (peer.ai ? 0.94 : 0.76);
      const crouching = !!peer.crouching;
      const h = crouching ? 30 : (peer.powered ? 54 : 36);
      const skin = skins[Number.isFinite(peer.skin) ? peer.skin % skins.length : state.skin] || skins[0];
      const color = peer.color || skin.shirt || "#74f7ff";
      const faceDir = peer.facing || 1;
      const walk = Math.sin((peer.step || 0) * Math.PI * 2);
      const headX = x + 14;
      const headY = crouching ? y + 7 : y + 1;
      const bodyTop = crouching ? y + 22 : (peer.powered ? y + 22 : y + 20);
      drawRect(x + 2, y + h + 2, 26, 5, "rgba(24,32,51,0.26)");
      drawRect(x + 2, bodyTop - 3, 28, h - 3, "rgba(0,0,0,0.18)");
      drawRect(x + 4, bodyTop - 2, 24, h - 5, "#111111");
      drawRect(headX - 13, headY, 26, 26, "#5a321e");
      drawRect(headX - 10, headY + 3, 20, 20, skin.skin || "#f2c19b");
      drawRect(headX - 10, headY + 3, 20, 4, "rgba(255,255,255,0.25)");
      if (peer.powered) {
        drawRect(headX - 13, headY - 2, 26, 7, skin.hat || color);
        drawRect(headX - 9, headY - 5, 18, 4, "#111111");
      }
      const shirtH = crouching ? 13 : (peer.powered ? 22 : 18);
      drawRect(x + 5, bodyTop, 20, shirtH, skin.shirt || color);
      drawRect(x + 7, bodyTop + 2, 16, 4, "rgba(255,255,255,0.32)");
      const legTop = bodyTop + shirtH - 3;
      const footY = y + h - 1;
      const legA = Math.round(walk * 2);

      sky.addColorStop(0, top);
      sky.addColorStop(0.55, mixColor("#99dcff", "#344d7f", night * 0.7));
      sky.addColorStop(1, bottom);
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H);

      for (let y = 0; y < H; y += 18) drawRect(0, y, W, 1, "#ffffff");
      ctx.globalAlpha = 1;
      drawSun(phase);
      const starAlpha = Math.max(0, night - 0.25);
      if (starAlpha > 0) {
        ctx.globalAlpha = starAlpha;
        for (let i = 0; i < 36; i++) {
          const x = (i * 83 + Math.floor(cam * 0.02)) % W;

          drawPixelSparkle(x, y, "#fff7cc");

        ctx.globalAlpha = 1;

      ctx.fillStyle = "rgba(61, 122, 162, 0.35)";

      const closeHit = sponsorCloseRects().some(r => clientX >= r.x && clientX <= r.x + r.w && clientY >= r.y && clientY <= r.y + r.h);

    function mixColor(a, b, t) {
      const pa = parseInt(a.slice(1), 16);
      const pb = parseInt(b.slice(1), 16);
      const ar = pa >> 16, ag = pa >> 8 & 255, ab = pa & 255;
      const br = pb >> 16, bg = pb >> 8 & 255, bb = pb & 255;
      const r = Math.round(ar + (br - ar) * t);
      const g = Math.round(ag + (bg - ag) * t);
      const blue = Math.round(ab + (bb - ab) * t);
      return "#" + ((1 << 24) + (r << 16) + (g << 8) + blue).toString(16).slice(1);
    }

      ctx.arc(x, y, 82, 0, Math.PI * 2);

      ctx.fillStyle = "#fff4a8";
      ctx.beginPath();
      ctx.arc(x, y, 52, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#ffd74a";
      ctx.beginPath();
      ctx.arc(x, y, 27, 0, Math.PI * 2);
      ctx.fill();
      drawRect(x - 8, y - 42, 16, 8, "rgba(255,255,255,0.35)");
      drawRect(x + 34, y - 4, 8, 16, "rgba(255,255,255,0.3)");

    function drawEnemy(x, y, kind, enemy = null) {
      if (kind === "turtle") {
        const shell = enemy && enemy.shell;

        const waking = shell && enemy && Math.abs(enemy.vx) < 0.1 && enemy.shellTimer < 120 && Math.floor(state.time / 8) % 2 === 0;

          drawRect(x + 6, y + 15, 20, 4, "#17843a");

    function drawPlayerShadow(x, y) {
      if (player.grounded) return;
      let ground = level.groundY;
      for (const c of level.clouds) {
        const left = c.x - state.camera;
        if (x + player.w / 2 >= left && x + player.w / 2 <= left + c.w && c.y > y + player.h && c.y < ground) ground = c.y;
      }
      const gap = Math.max(0, ground - (y + player.h));
      if (gap < 12 || gap > 260) return;
      const alpha = Math.max(0.12, 0.32 - gap / 900);
      ctx.globalAlpha = alpha;
      drawRect(x + 4, ground - 4, player.w + 12, 4, "#182033");
      ctx.globalAlpha = 1;
    }

        ctx.rotate(phase * Math.PI * 4 * player.facing);

    function drawJoystick() {
      const layout = joystickLayout();
      const baseX = layout.baseX;
      const baseY = layout.baseY;
      let knobX = joystick.active ? joystick.knobX : baseX;
      let knobY = joystick.active ? joystick.knobY : baseY;
      const dx = knobX - baseX;
      const dy = knobY - baseY;
      const dist = Math.hypot(dx, dy);
      if (dist > layout.limit) {
        knobX = baseX + dx / dist * layout.limit;
        knobY = baseY + dy / dist * layout.limit;
      }
      ctx.globalAlpha = 0.34;
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(baseX, baseY, layout.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = "#ffd74a";
      ctx.beginPath();
      ctx.arc(knobX, knobY, layout.knob, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#182033";
      ctx.lineWidth = Math.max(3, 4 * controlScale);
      ctx.stroke();
      ctx.globalAlpha = 1;
      drawText("MOVE", baseX, baseY + 5 * controlScale, Math.max(11, 13 * controlScale), "#182033", "center");
    }

      drawText(label, x + w / 2, y + h / 2 + size / 2 - 2, size, "#182033", "center");

      drawText(firstAbility + "-" + Math.min(visibleAbilities.length, state.abilityScroll + 5) + " / " + visibleAbilities.length, 711, 463, 11, "#6f7f8f", "center");

      drawPanel(890, 326, 34, 130, "#eff8ff");
      const thumbH = Math.max(28, 130 * Math.min(1, 5 / Math.max(5, visibleAbilities.length)));
      const thumbY = 326 + (maxAbilityScroll ? (130 - thumbH) * state.abilityScroll / maxAbilityScroll : 0);
      drawPanel(896, thumbY + 5, 22, Math.max(18, thumbH - 10), "#8fbaff");

    function drawBuilder() {
      const cam = state.builderCamera;
      drawBackground(0.18, cam);
      state.buttons = [];
      for (let x = -cam % TILE; x < W; x += TILE) drawRect(x, 72, 1, H - 164, "rgba(255,255,255,0.22)");
      for (let y = 80; y < H - 92; y += TILE) drawRect(0, y, W, 1, "rgba(255,255,255,0.22)");
      for (let x = -cam % TILE; x < W; x += TILE) drawBlock(x, level.groundY, { x, y: level.groundY, w: TILE, h: 130, type: "ground" });
      drawText("BUILDER", 24, 36, 24, "#ffd74a", "left", "#182033");
      drawText("Tool: " + builderToolName(state.builderTool), W / 2, 36, 16, "#182033", "center", "#d9edff");

      drawBuilderPalette();
    }

    function drawBuilderItem(it, cam) {
      const x = it.tx * TILE - cam;
      const y = it.row * TILE;
      if (it.type === "brick" || it.type === "question") drawBlock(x, y, { x, y, w: TILE, h: TILE, type: it.type, used: false });
      else if (it.type === "coin") drawCoin(x + 20, y + 20);
      else if (it.type === "enemy") drawEnemy(x + 5, y + 6, "ground");
      else if (it.type === "turtle") drawEnemy(x + 4, y + 8, "turtle");
      else if (it.type === "torah") drawFlower(x + 2, y - 18, { alive: true, health: 2, flash: 0, phase: 0 });
      else if (it.type === "cloudrider") drawEnemy(x + 2, y - 28, "cloudrider");
      else if (it.type === "pipe") {
        if ((it.dir || 0) % 2 === 1) drawPipe(x, level.groundY - TILE, 116, TILE);
        else drawPipe(x, level.groundY - 2 * TILE, 76, 2 * TILE);
      } else if (it.type === "cloud") drawCloudPlatform(x, y, (it.dir || 0) % 2 === 1 ? 210 : 140, 28);
      drawTurnMark(x, y, it.dir || 0);
    }

    function drawTurnMark(x, y, dir) {
      const arrows = [">", "v", "<", "^"];
      drawPanel(x + 8, y - 18, 25, 18, "#fff3a8");
      drawText(arrows[dir % 4], x + 20, y - 5, 11, "#182033", "center");
    }

    function drawBuilderPalette() {
      drawPanel(18, H - 82, W - 36, 68, "#d9edff");
      const tools = ["brick", "question", "coin", "turtle", "torah", "cloud", "cloudrider", "pipe", "turn", "erase"];
      tools.forEach((tool, i) => {
        const x = 26 + i * 58;
        button(x, H - 66, 52, 42, builderToolName(tool), () => { state.builderTool = tool; }, tool === state.builderTool ? "#fff3a8" : "#ffffff", 7);
      });
      button(W - 284, H - 66, 74, 42, "CLEAR", clearBuilderLevel, "#ffad7a", 9);
      button(W - 202, H - 66, 74, 42, "LEFT", () => { state.builderCamera = Math.max(0, state.builderCamera - TILE * 4); }, "#ffb9df", 9);
      button(W - 120, H - 66, 82, 42, "RIGHT", () => { state.builderCamera = Math.min(120 * TILE - W, state.builderCamera + TILE * 4); }, "#ffb9df", 9);
    }

      const names = { brick: "BRICK", question: "?", coin: "COIN", enemy: "BOT", turtle: "TURT", torah: "TORAH", cloudrider: "RIDER", pipe: "PIPE", cloud: "CLOUD", turn: "TURN", erase: "ERASE" };

    function button(x, y, w, h, label, action, color = "#ffad7a", size = 15) {
      const pressed = state.pressedButton && state.pressedButton.x === x && state.pressedButton.y === y;
      drawPanel(x + (pressed ? 2 : 0), y + (pressed ? 2 : 0), w, h, color);
      drawText(label, x + w / 2, y + h / 2 + size / 2 - 1, size, "#182033", "center");
      state.buttons.push({ x, y, w, h, action });
    }

    function shopButton(x, y, w, h, title, sub, action, color) {
      const pressed = state.pressedButton && state.pressedButton.x === x && state.pressedButton.y === y;
      drawPanel(x + (pressed ? 2 : 0), y + (pressed ? 2 : 0), w, h, color);
      drawText(title, x + w / 2, y + 19, 13, "#182033", "center");
      drawText(sub, x + w / 2, y + 37, 10, "#34445d", "center");
      state.buttons.push({ x, y, w, h, action });
    }

    function drawCodeBox() {
      const r = codeRect();
      drawPanel(r.x, r.y, r.w, r.h, state.codeActive ? "#fff3a8" : "#d9edff");
      const typedText = state.codeText ? state.codeText.toUpperCase() : "TYPE CODE";
      const label = state.codeActive ? (typedText + (state.time % 40 < 20 ? "|" : "")) : "CLICK CODE";
      drawText(label, r.x + 14, r.y + 27, 14, "#182033");
    }

    function drawAbilitySearchBox() {
      const r = abilitySearchRect();
      drawPanel(r.x, r.y, r.w, r.h, state.searchActive ? "#fff3a8" : "#ffffff");
      const text = state.searchActive
        ? ((state.abilitySearch || "search ability") + (state.time % 40 < 20 ? "|" : ""))
        : (state.abilitySearch ? state.abilitySearch : "SEARCH");
      drawText(text.toUpperCase(), r.x + 12, r.y + 21, 11, state.abilitySearch ? "#182033" : "#6f7f8f");
      if (state.abilitySearch) {
        button(r.x + r.w - 38, r.y + 4, 30, 22, "X", () => {
          state.abilitySearch = "";
          state.abilityScroll = 0;
          if (state.searchActive) codeInput.value = "";
        }, "#ffb9df", 10);
      }
    }

    function drawPanel(x, y, w, h, color) {
      ctx.save();
      ctx.shadowColor = "rgba(22, 25, 48, 0.16)";
      ctx.shadowBlur = 8;
      ctx.shadowOffsetY = 4;
      ctx.fillStyle = color;
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      roundRectPath(x, y, w, h, 16);
      ctx.fill();
      ctx.shadowColor = "transparent";
      ctx.stroke();
      ctx.restore();
    }

    function roundRectPath(x, y, w, h, r) {
      r = Math.min(r, w / 2, h / 2);
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawText(text, x, y, size, color, align = "left", back = "") {
      ctx.textAlign = align;
      ctx.font = "900 " + size + "px Arial";
      if (back) {
        const m = ctx.measureText(text);
        const bx = align === "center" ? x - m.width / 2 - 14 : x - 12;
        drawPanel(bx, y - size - 8, m.width + 28, size + 18, back);
      }
      if (!back && size >= 24) {
        ctx.lineWidth = Math.max(2, Math.floor(size / 12));
        ctx.strokeStyle = "rgba(22, 25, 48, 0.38)";
        ctx.strokeText(text, x, y);
      }
      ctx.fillStyle = color;
      ctx.fillText(text, x, y);
    }

    function loop() {
      try {
        update();
        draw();
      } catch (error) {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.fillStyle = "#7bd7ff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#182033";
        ctx.font = "bold 24px Arial";
        ctx.fillText("Tap to reload game", 30, 60);
        state.screen = "menu";
        clearInputState();
        console.error(error);
      }
      requestAnimationFrame(loop);
    }
    resetLevel();
    loop();
